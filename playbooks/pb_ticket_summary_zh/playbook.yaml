# Playbook: pb_ticket_summary_zh
# 中文 Incident 摘要；产物 schema = incident_summary_v1
# 路径约定：playbooks/<id>/{playbook.yaml, prompt.md}

id: "pb_ticket_summary_zh"
version: "2.0.0"

description: |
  Given a redacted IT incident (JSON), produce a structured summary
  conforming to incident_summary_v1, with citations traceable to KB
  chunks via kb.search.

  v2.0.0: Work item model — output_schema migrates ticket_summary_v1
  -> incident_summary_v1 (work_item_ref, work_item_type, and
  next_actions[] upgraded to structured, tiered tasks[]).

  v1.4.0 (PR-8.5): retrieval.mode=prefetch — orchestrator runs
  kb_search once before the chat loop and folds the hits into the
  system prompt, so weak tool-calling models (e.g. gemma4:e4b) can
  still cite real KB chunks. Flip retrieval.mode=tool to fall back to
  the classic ReAct loop for stronger models.

# Path is resolved relative to this file.
system_prompt: "prompt.md"

# Output artifact schema (registered in opspilot.schemas registry).
output_schema: "incident_summary_v1"

# Tools the orchestrator exposes to the LLM.
# `kb_search` = retrieval over the configured KB; results returned as
# JSON {hits: [{chunk_id, document_id, content, citation}]}.
tools:
  - name: "kb_search"
    description: "Hybrid (vector + FTS5) retrieval over the OpsPilot KB. Use it when the ticket mentions any system / error / SOP-eligible topic. Returns chunks with citation handles you can reference in your final JSON."

# Primary model.
model:
  provider_id: "anthropic"
  kind: "anthropic"
  name: "claude-haiku-4-5-20251001"
  version: "2025-01"
  params:
    temperature: 0.2
    top_p: 0.9
    max_tokens: 4096

# Additional selectable models (shown in the UI dropdown alongside the primary).
# Weak local models (kind=ollama) automatically switch retrieval.mode to prefetch.
extra_models:
  - provider_id: "anthropic"
    kind: "anthropic"
    name: "claude-sonnet-4-5"
    version: "2025-01"
    params:
      temperature: 0.2
      top_p: 0.9
      max_tokens: 8192
  - provider_id: "anthropic"
    kind: "anthropic"
    name: "claude-opus-4-5"
    version: "2025-01"
    params:
      temperature: 0.2
      top_p: 0.9
      max_tokens: 8192
  - provider_id: "openrouter"
    kind: "openai"
    name: "google/gemini-2.0-flash-001"
    version: "2025-01"
    params:
      temperature: 0.2
      top_p: 0.9
      max_tokens: 4096
  - provider_id: "ollama-local"
    kind: "ollama"
    name: "gemma4:e4b"
    version: "2026-04"
    params:
      temperature: 0.2
      top_p: 0.9
      max_tokens: 3000

# Loop bounds.
limits:
  max_turns: 8           # tool-call rounds before giving up (mode=tool only)
  max_kb_search_results: 5

# Sensitivity defaults; CLI may override.
defaults:
  retention_class: "medium"
  sensitivity: "internal"
  kb_id: "opspilot:public-kb"

# Retrieval strategy (PR-8.5).
#   mode=tool     — model decides when to call kb_search (classic ReAct)
#   mode=prefetch — orchestrator pre-runs kb_search and folds hits into
#                   system prompt; chat runs once with tools=[]
retrieval:
  mode: "prefetch"
  prefetch:
    # top_k omitted ⇒ falls back to limits.max_kb_search_results (D5)
    query_fields: ["subject", "body"]
