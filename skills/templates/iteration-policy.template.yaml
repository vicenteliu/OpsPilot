# Iteration Policy — 全局迭代策略 / Global iteration policy
# 控制：触发阈值、晋升标准、variant 生命周期、回滚窗口

version: "1.0.0"

# 1. 触发阈值 / Trigger thresholds
triggers:

  regression_threshold: -0.03                     # harness weighted score 掉点超过 3% → 自动 iteration
  regression_window_runs: 3                       # 连续 3 次 run 都掉点才触发（避免单次抖动误触）

  feedback_min_weight_to_trigger: 5.0             # 累积反馈 |weight| ≥ 5 触发
  feedback_window_days: 30
  feedback_decay_half_life_days: 14               # 信号半衰期

  distillation_pattern_min_support: 5             # 至少 5 个 session 出现的新 pattern 才作为信号

  scheduled_review_cron: "0 0 * * 1"              # 每周一 00:00 跑 scheduled iteration（即使无其他信号）
  scheduled_review_skip_if_iter_within_days: 7    # 若 7 天内已迭代过，跳过本次 scheduled

  on_model_upgrade:
    enabled: true
    affects_skills_with_compat: true              # model_compat 含被升级 model 的 skill 才触发

# 2. 提议规则 / Proposal rules
proposal:
  max_changes_per_iteration: 2                    # 单次迭代最多改 2 个字段（强制小步快跑）
  forbid_simultaneous:                            # 这些组合禁止同次改
    - ["description", "requires.tools"]           # 触发条件 + 依赖同时变 → 归因不清
  llm_for_drafting:
    model_ref: "anthropic-claude/claude-sonnet-4-6@2026-04"
    max_attempts: 3
    budget_usd: 0.20

# 3. Variant 生命周期 / Variant lifecycle
variant_lifecycle:
  max_concurrent_active: 3                        # 同 skill 同时 active variant 上限
  variant_max_lifetime_days: 14                   # 14 天未 promote 自动 archive
  auto_archive_losing: true
  losing_archive_retention_days: 90               # archive 后保留 90 天便于复盘

# 4. 评估配置 / Evaluation
evaluation:
  require_anchor_fixtures: true                   # 必须声明 anchor，无则拒绝运行
  min_fixtures_count: 3                           # fixtures 数量下限
  rerun_baseline_max_age_hours: 24                # baseline 结果 24 小时内可复用，否则重跑

# 5. 晋升标准（全部满足才能 winning） / Promotion criteria
promotion:
  min_delta_weighted: 0.01                        # variant 必须比 baseline 加权分 +0.01
  no_regression_on_anchors: true                  # anchor fixtures 上 pass_rate 不低于 baseline
  max_cost_increase_pct: 10                       # 成本增长 ≤ 10%
  max_latency_p95_increase_pct: 20
  trigger_eval_must_still_pass: true              # recall ≥0.9, FP ≤0.05
  static_checks_must_pass: true                   # PII / prompt-injection / tool resolvable

  # 是否需要人工审批
  human_approval_required: true
  approver_roles: ["lead", "manager"]
  min_approvals: 1

  # 全自动 promote 的例外（极小步改动，且 delta 显著）
  auto_promote_when:
    enabled: false                                # 默认关闭；显式启用
    only_for_change_kinds: ["tighten"]            # 只允许 tighten 类（收紧条件，更安全）
    min_delta_weighted: 0.05
    max_changed_fields: 1

# 6. 拒绝与重迭代 / Rejection
rejection:
  on_no_winner_iterate_again: true                # 全部 losing → 自动起一轮 iterate_again（最多 N 次）
  max_iterate_again_chain: 3
  on_chain_exhausted: "manual_intervention"       # 达上限不再自动；标记需人工介入

# 7. 回滚 / Rollback
rollback:
  preserve_previous_n_versions: 3
  can_rollback_within_days: 30
  require_two_person_for_trusted_skills: true
  rollback_creates_new_lineage_entry: true        # 回滚不删历史；只追加 "rolled_back_to_x.y.z" 条目

# 8. Lineage 维护 / Lineage maintenance
lineage:
  store_path: "skills/lineage/<skill_name>.yaml"
  retain_voided_promotions: true                  # 即使被回滚，promotion 历史保留
  audit_every_state_change: true

# 9. 多 skill 联合迭代（实验性） / Joint iteration（experimental）
joint_iteration:
  enabled: false
  groups:
    # 例：zh + en 双胞胎 skill 必须同步迭代
    # - skills: ["ticket_summary_zh", "ticket_summary_en"]
    #   sync_fields: ["description", "outputs.schema_ref"]

# 10. 安全约束 / Safety
safety:
  forbid_iteration_on_lifecycle_states: ["draft", "deprecated", "archived"]
  forbid_iteration_on_trust_tiers: ["imported_unknown"]
  signed_iteration_records: false                 # 是否要求 iteration 记录加密签名（合规高时启用）
