# Mid-term memory config template
# Backend: SQLite (with FTS5 full-text index) + companion markdown sources (human-readable, git-friendly)

version: "1.0.0"

# 1. Storage
storage:
  # SQLite file path; user-private data goes under ~/.opspilot/, team-shared data lives in the repo
  sqlite_path: "${OPSPILOT_HOME:-~/.opspilot}/memory/mid-term.db"
  # markdown source directory; ids map to file names (mem_<sha8>.md)
  markdown_dir: "${OPSPILOT_HOME:-~/.opspilot}/memory/records/"
  # verify SQLite ←→ markdown consistency at startup (hash alignment)
  consistency_check_on_start: true
  # backup policy
  backup:
    enabled: true
    cron: "0 4 * * *"            # daily at 04:00
    retain_days: 14
    target: "${OPSPILOT_HOME:-~/.opspilot}/memory/backups/"

# 2. Namespaces
namespaces:
  - name: "opspilot:user"
    description: "User role, preferences, knowledge"
    visibility: "private"        # private | team | public
    require_redaction: true

  - name: "opspilot:feedback"
    description: "AI-collaboration corrections and confirmations (incl. why)"
    visibility: "private"
    require_redaction: true

  - name: "opspilot:project"
    description: "Project status, decisions, deadlines"
    visibility: "team"
    require_redaction: true

  - name: "opspilot:reference"
    description: "Pointers to external systems (not the facts themselves)"
    visibility: "team"
    require_redaction: false      # usually contains no PII

# 3. Write policy
write_policy:
  # feedback / project types must contain **Why:** and **How to apply:** sections
  enforce_structured_body:
    feedback: true
    project: true
  # maximum length of a single body
  max_body_chars: 4000
  # duplicate detection: highly similar title + body → suggest updating instead of creating
  dedup:
    enabled: true
    similarity_threshold: 0.92
    similarity_method: "embedding"   # embedding | shingle

# 4. Retention
retention:
  # no expiry by default; records only expire when valid_until is set explicitly
  default_ttl_days: null
  # behavior after expiry: read_only | archive | delete
  on_expire: "read_only"
  # recoverable for N days after archiving
  archive_grace_days: 30

# 5. Retrieval defaults
retrieval_defaults:
  mode: "hybrid"
  top_k: 5
  hybrid:
    vector_weight: 0.5
    keyword_weight: 0.5
    fusion: "rrf"
  rerank:
    enabled: false
  # weighted by confidence by default (high=1.2, medium=1.0, low=0.7)
  confidence_boost:
    high: 1.2
    medium: 1.0
    low: 0.7

# 6. Harvest & lifecycle
harvest:
  # triggered by short-term-config.harvest_to_mid_term
  enabled: true
  # candidate review queue
  review_queue_path: "${OPSPILOT_HOME:-~/.opspilot}/memory/review-queue.jsonl"
  # review expiry: unreviewed for N days → dropped automatically
  review_ttl_days: 7

# 7. Anti-patterns (documentation only, not enforced at runtime)
anti_patterns:
  - "Don't put code patterns / file paths / project structure into memory (grep gets those)"
  - "Don't put git history / who changed what into memory (git log/blame are authoritative)"
  - "Don't put debugging solutions into memory (the fix lives in the code; the commit has the context)"
  - "Don't put ephemeral in-progress tasks into memory (use session or task)"
