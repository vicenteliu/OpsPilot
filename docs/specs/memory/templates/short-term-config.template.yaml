# Short-term memory config template
# Short-term memory gets no tables of its own; this config controls context-window
# management and summarization triggers. The actual data lives in session/trace.jsonl.

version: "1.0.0"

# 1. Context window budgeting
context_window:
  # aligned with the selected model's long_context_tokens; set conservatively low
  max_tokens: 100000
  # reserved for the current response (to avoid truncation)
  reserve_for_response: 8000
  # reserved for the system prompt + tool schema
  reserve_for_system: 4000
  # reserved for RAG retrieval injection (kb.search results)
  reserve_for_retrieval: 12000

# 2. Overflow policy
policy:
  # truncate           : drop the oldest outright (large information loss)
  # summarize_oldest   : merge the oldest N entries into a summary system event (default)
  # summarize_smart    : let the LLM choose which events to keep or summarize
  on_overflow: "summarize_oldest"

  # proactively trigger summarization when remaining tokens drop below this value (prevents sudden overruns)
  summarize_when_remaining_lt: 16000

  # events pinned by the user are excluded from trimming
  keep_pinned: true

  # always keep the last N user turns (so summarization doesn't compress what was just said)
  keep_last_n_user_turns: 4

  # keep tool calls paired with their results (never summarize away one half)
  keep_tool_call_pairs: true

# 3. Summarization
summary:
  # use a registry alias, not a concrete model; summaries go through the fast tier
  use_provider_alias: "@chat-fast"
  # summary prompt template (in prompts/)
  template_ref: "prompts/summarize_session_zh.md"
  max_summary_tokens: 1024
  # how the summary is written back to trace: as a system event + summary_marker tag
  store_as_trace_event: "system"
  summary_marker_event: "summary_marker"
  # elements the summary must preserve
  must_preserve:
    - "preferences the user stated explicitly (potential mid-term feedback candidates)"
    - "adopted decisions"
    - "the list of executed sandbox actions (incl. exit_code)"
    - "the list of document_ids hit by kb.search"

# 4. Scratchpad
scratchpad:
  enabled: true
  # which event type stores the scratchpad in the trace
  trace_event_type: "system"
  trace_event_subtype: "scratchpad"
  # per-entry scratchpad character limit; anything larger goes to an artifact
  max_inline_chars: 4096
  # whether to clear the scratchpad when the session is archived
  clear_on_archive: true

# 5. Short-term → mid-term harvest triggers
harvest_to_mid_term:
  enabled: true
  triggers:
    - "user_action == pin_to_memory"
    - "user feedback contains the keyword 'remember'"
    - "session.status transitions to archived (candidate list submitted, awaiting user confirmation)"
  candidate_review:
    # auto-store vs. candidate review
    mode: "candidate_review"   # auto | candidate_review
    require_user_confirmation: true
