# RAG ingestion pipeline template
# Stages: discover → classify → redact → chunk → embed → upsert
# Every stage must be re-entrant and recoverable; failure granularity = single document

version: "1.0.0"

# Reference: which KB this ingestion belongs to
kb_ref: "kb_public_zh"

# 1. discover — Source discovery
discover:
  source_root: "playbooks/"
  glob:
    - "**/*.md"
    - "**/*.markdown"
  exclude:
    - "**/_drafts/**"
    - "**/private/**"
    - "**/.obsidian/**"
  follow_symlinks: false
  manifest_output: "${index_root}/manifest.jsonl"   # one line per entry: source_path + last_modified + size

# 2. classify — Classification & metadata extraction
classify:
  read_frontmatter: true               # read markdown frontmatter (YAML)
  fallback_title: "filename"           # use the filename when frontmatter.title is absent
  classification_rules_ref: "kb-config.template.yaml#classification_rules"
  language_detect:
    enabled: true
    library_hint: "langdetect or similar"   # implementation choice; distinguishing Chinese/English is enough
  tag_extraction:
    from_frontmatter: true
    from_first_h1_keywords: false       # experimental

# 3. redact — Redaction (hard requirement)
redact:
  rules_ref: "../../session/templates/redaction-rules.template.yaml"
  hard_fail_on_pii_check: true
  # every hit is written to audit; never to the primary index
  audit_log_path: "${index_root}/audit.log"
  # whether to emit a "redacted copy" (for manual review)
  emit_redacted_copy:
    enabled: true
    target_dir: "${index_root}/redacted/"

# 4. chunk — Chunking
chunk:
  strategy: "headings_then_size"
  target_size_tokens: 512
  max_size_tokens: 1024
  overlap_tokens: 64
  preserve_heading_path: true
  # sha256 of the chunk content is used as chk_<sha8>
  hash_inputs: ["content_after_redact"]
  # chunk content > 8 KiB goes to an artifact; meta row gets content=null + content_artifact_id
  inline_threshold_bytes: 8192

# 5. embed — Embedding
embed:
  provider_id: "ollama-local"
  model: "nomic-embed-text"
  version: "2024-02"
  dim: 768
  batch_size: 32
  retry:
    max_attempts: 3
    initial_backoff_ms: 500
    max_backoff_ms: 8000
  # failed chunks are held aside and can be retried individually later
  failure_holding_dir: "${index_root}/embed-pending/"

# 6. upsert — Write to storage (LanceDB + SQLite transaction)
upsert:
  # incremental-sync semantics
  delete_obsolete_chunks: true         # delete chunks that no longer appear under the old doc_id
  update_document_meta: true
  # failure rollback: any chunk failure within the batch → the whole batch is not committed
  transactional: true
  # disable live index refresh for bulk loads; run a single optimize at the end
  defer_index_refresh: true
  finalize:
    refresh_vector_index: true
    rebuild_fts_if_dirty: true

# 7. Pipeline-level
pipeline:
  parallelism: 4
  per_doc_timeout_seconds: 60
  budget:
    total_usd: 1.00                    # budget per ingestion run
    on_exceeded: "block"               # block on overrun (prevents accidentally burning money on cloud embeddings)
  observability:
    log_level: "info"
    metrics:
      - "docs_processed"
      - "chunks_created"
      - "tokens_embedded"
      - "redaction_hits"
      - "errors_total"
    progress_file: "${index_root}/progress.jsonl"

# 8. Triggers
triggers:
  manual: true                          # CLI: opspilot ingest --kb kb_public_zh
  git_post_commit: true                 # only fires when files under source_root change
  cron: "0 2 * * *"

# 9. Dry-run
dry_run:
  enabled_default: true                 # always dry_run on the first run
  outputs:
    - "manifest"
    - "would_chunk_count_per_doc"
    - "estimated_embedding_cost_usd"
    - "redaction_hit_summary"
  refuse_apply_if:
    - "estimated_embedding_cost_usd > pipeline.budget.total_usd"
    - "redaction_hard_fail_count > 0"

# 10. Backup & rollback
rollback:
  # snapshot the SQLite and LanceDB files before ingestion
  snapshot_before_upsert: true
  snapshot_dir: "${index_root}/snapshots/"
  retain_snapshots: 5
  rollback_command_hint: "opspilot kb rollback --kb kb_public_zh --snapshot <id>"
