# Retrieval & rerank config template
# Two use cases:
#   1) kb.search     — long-term knowledge-base retrieval
#   2) memory.search — mid-term memory retrieval (type filter)
# Equivalent to schemas/retrieval-query.schema.json

version: "1.0.0"

# Defaults (overridden per request)
defaults:

  # ── kb.search ──────────────────────────────────────────
  kb:
    mode: "hybrid"                  # vector | keyword | hybrid
    top_k: 8
    scopes:
      - "opspilot:public-kb"
    filters:
      classification:
        in: ["public", "internal"]
    hybrid:
      vector_weight: 0.6
      keyword_weight: 0.4
      fusion: "rrf"                 # RRF by default; robust to rank noise
      rrf_k: 60
    rerank:
      enabled: true
      type: "cross_encoder"
      top_n: 4
      model_ref: "ollama-local/bge-reranker-v2-m3@2024-08"
    return_citations: true
    budget_usd: 0.02

  # ── memory.search ──────────────────────────────────────
  memory:
    mode: "hybrid"
    top_k: 5
    scopes:
      - "opspilot:user"
      - "opspilot:feedback"
      - "opspilot:project"
    type_filter: []                 # empty = all types
    hybrid:
      vector_weight: 0.5
      keyword_weight: 0.5
      fusion: "rrf"
      rrf_k: 60
    rerank:
      enabled: false                # mid-term records are usually few; reranking is unnecessary
    confidence_boost:
      high: 1.2
      medium: 1.0
      low: 0.7
    return_citations: true
    budget_usd: 0.005

# Format for injecting citations into the prompt (suggested)
citation_injection:
  enabled: true
  style: "footnote_marker"          # footnote_marker | inline_quote | structured_block
  marker_format: "[^kb-{rank}]"
  footnote_format: |
    [^kb-{rank}]: {source_path}:{line_start}-{line_end} · {heading_path_joined}
  # how many characters of the prompt to reserve for retrieval excerpts
  max_chars_per_result: 800
  max_total_chars: 4800

# Security
security:
  # tighten scopes at retrieval time according to session.sensitivity
  enforce_session_sensitivity: true
  sensitivity_to_max_classification:
    public: "public"
    internal: "internal"
    confidential: "internal"
    restricted: "internal"          # a restricted session must not query the restricted KB (prevents privilege escalation)
  # multi-tenancy: forbid cross-namespace retrieval (unless listed explicitly)
  forbid_implicit_cross_namespace: true

# Observability
observability:
  # write one trace event per retrieval (type=tool_call + tool=kb.search)
  emit_trace_event: true
  metrics:
    - "vector_hits"
    - "keyword_hits"
    - "rerank_used"
    - "cost_usd"
    - "latency_ms"
  # long-tail analysis: low-score hits / zero results go to the analysis pool
  low_score_log:
    enabled: true
    threshold: 0.3
    target: "${index_root}/low-score-queries.jsonl"

# Fallback policy
fallback:
  # rerank model failure → degrade to hybrid (no reranking)
  on_rerank_failure: "skip_rerank"
  # vector retrieval failure → degrade to keyword-only
  on_vector_failure: "keyword_only"
  # keyword also fails → return empty results + a system event
  on_total_failure: "empty_results_with_system_event"
