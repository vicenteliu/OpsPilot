# Long-term KB config template
# One config = one KB instance; a project may have multiple KBs (team, product line, sensitivity)

version: "1.0.0"

kb:
  id: "kb_public_zh"
  display_name: "OpsPilot Public Knowledge Base (Chinese)"
  description: "Public SOP / Runbook collection for L1/L2 IT operations"
  namespace: "opspilot:public-kb"
  language: "zh-CN"

# 1. Storage
storage:
  # markdown source directory (git-managed; the input and the authority)
  source_root: "playbooks/"
  # derived indices (git ignored)
  index_root: "${OPSPILOT_HOME:-~/.opspilot}/kb/${kb.id}/"
  # SQLite metadata path
  sqlite_path: "${OPSPILOT_HOME:-~/.opspilot}/kb/${kb.id}/meta.db"
  # LanceDB data directory
  lancedb_path: "${OPSPILOT_HOME:-~/.opspilot}/kb/${kb.id}/lancedb/"
  # must be in .gitignore
  gitignore_required:
    - "${index_root}"
    - "*.lance/"

# 2. Sources
sources:
  - kind: "filesystem"
    glob:
      - "playbooks/**/*.md"
      - "governance/**/*.md"
    exclude:
      - "**/_drafts/**"
      - "**/private/**"
    classification_default: "internal"

  # External wiki / Confluence / Notion etc.: export to markdown first, then go through filesystem
  # - kind: "filesystem"
  #   glob: ["external/wiki-export/**/*.md"]
  #   classification_default: "internal"
  #   tag_default: ["wiki-import"]

# 3. Classification mapping
classification_rules:
  # determine classification via frontmatter / path; fall back to default when nothing matches
  - if: "frontmatter.classification exists"
    use: "frontmatter.classification"
  - if: "path matches 'governance/**'"
    set: "internal"
  - if: "frontmatter.tags includes 'public'"
    set: "public"
  default: "internal"

  # restricted documents do not enter the vector store by default (keyword-only + restricted namespace)
  restricted_handling:
    skip_vector_index: true
    require_explicit_namespace: "opspilot:restricted-kb"

# 4. Redaction (hard requirement)
redaction:
  rules_ref: "../../session/templates/redaction-rules.template.yaml"
  enforce_before_chunking: true
  hard_fail_on_pii_check: true       # ingestion fails → document does not enter the index
  audit_log_path: "${index_root}/audit.log"

# 5. Chunking
chunking:
  strategy: "headings_then_size"     # see SPEC.md §7
  target_size_tokens: 512
  max_size_tokens: 1024
  overlap_tokens: 64
  preserve_heading_path: true        # mandatory
  token_counter: "tiktoken-cl100k"   # aligned with the embedding model's token counting

# 6. Embedding (must go through the providers/ abstraction layer)
embedding:
  # provider_id from the registry; requires capabilities.embeddings: true
  provider_id: "ollama-local"
  model: "nomic-embed-text"
  version: "2024-02"
  dim: 768
  batch_size: 32
  on_provider_unavailable: "fail"    # fail | retry_with_backoff
  # upgrading the embedding model = full index rebuild; explicit confirmation required
  upgrade_policy:
    require_full_rebuild: true
    require_user_confirm: true

# 7. Vector index (LanceDB)
vector_index:
  table_name: "chunks"
  metric: "cosine"                   # cosine | l2 | dot
  ann:
    type: "ivf_pq"                   # ivf_pq | hnsw (depending on LanceDB version support)
    num_partitions: 64               # 32-128 is fine for datasets < 500K
    num_sub_vectors: 96
  refresh_on_upsert: false           # refresh only after bulk ingestion completes
  optimize_cron: "0 5 * * 0"          # optimize every Sunday 05:00

# 8. Keyword index (SQLite FTS5)
keyword_index:
  fts_version: "fts5"
  tokenizer: "porter unicode61 remove_diacritics 2"
  # Chinese needs a special tokenizer (e.g. jieba); decide during implementation
  cjk_strategy: "ngram"              # ngram | jieba | simple
  ngram_range: [2, 3]

# 9. Ingestion schedule
ingestion:
  mode: "incremental"                # full | incremental
  trigger:
    on_git_post_commit: true
    cron: "0 2 * * *"                # daily incremental full scan at 02:00
  parallelism: 4
  failure_quarantine_dir: "${index_root}/quarantine/"

# 10. Retrieval defaults (overridden by retrieval.template.yaml)
retrieval_defaults:
  mode: "hybrid"
  top_k: 8
  hybrid:
    vector_weight: 0.6
    keyword_weight: 0.4
    fusion: "rrf"
    rrf_k: 60
  rerank:
    enabled: false
