# Default redaction rules template
# Aligned with governance/redaction.md; governance is the final authority.
# Placeholder format: [REDACTED:<type>:<8 hex chars>]
# The hash is computed from "original text + session_secret"; reversible only within the audit domain.

version: "1.0.0"

# Replace on hit; rules are matched in list order (first match, first replaced)
rules:
  # ─── PII ──────────────────────────────────────────────
  - id: "rule.email"
    description: "Email address"
    pattern: '(?i)[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}'
    placeholder_type: "email"

  - id: "rule.phone_cn"
    description: "CN mobile"
    pattern: '(?<!\d)1[3-9]\d{9}(?!\d)'
    placeholder_type: "phone"

  - id: "rule.phone_intl"
    description: "Generic international phone (loose)"
    pattern: '\+?\d{1,3}[\s-]?\(?\d{1,4}\)?[\s-]?\d{3,4}[\s-]?\d{3,4}'
    placeholder_type: "phone"

  - id: "rule.id_cn_18"
    description: "CN national ID"
    pattern: '(?<!\d)\d{17}[\dXx](?!\d)'
    placeholder_type: "national_id"

  # ─── Network & hosts ──────────────────────────────────
  - id: "rule.ipv4"
    description: "IPv4 address (excluding RFC1918 if you want; default catches all)"
    pattern: '(?<!\d)(?:\d{1,3}\.){3}\d{1,3}(?!\d)'
    placeholder_type: "ipv4"
    exceptions:
      - "127.0.0.1"
      - "0.0.0.0"

  - id: "rule.ipv6"
    description: "IPv6 address"
    pattern: '(?:[A-Fa-f0-9]{1,4}:){2,7}[A-Fa-f0-9]{1,4}'
    placeholder_type: "ipv6"

  - id: "rule.hostname_internal"
    description: "Internal hostnames"
    pattern: '\b[a-z0-9-]+\.(corp|internal|intra|lan|local)\b'
    placeholder_type: "hostname"

  # ─── Secrets ──────────────────────────────────────────
  - id: "rule.aws_akid"
    description: "AWS Access Key ID"
    pattern: '(?<![A-Z0-9])(AKIA|ASIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASCA)[A-Z0-9]{16}(?![A-Z0-9])'
    placeholder_type: "aws_akid"

  - id: "rule.aws_secret"
    description: "AWS Secret Access Key (heuristic)"
    pattern: '(?i)aws(.{0,20})?(secret|key)(.{0,20})?[:=]\s*[A-Za-z0-9/+=]{40}'
    placeholder_type: "aws_secret"

  - id: "rule.bearer_token"
    description: "Bearer token in Authorization header"
    pattern: '(?i)Bearer\s+[A-Za-z0-9._\-]+'
    placeholder_type: "bearer"

  - id: "rule.jwt"
    description: "JWT (3 base64 segments)"
    pattern: 'eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+'
    placeholder_type: "jwt"

  - id: "rule.private_key"
    description: "PEM private key block"
    pattern: '-----BEGIN (?:RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----[\s\S]+?-----END (?:RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'
    placeholder_type: "private_key"

  - id: "rule.generic_secret_assignment"
    description: "Generic key=value secret assignment (heuristic)"
    pattern: '(?i)(api[_-]?key|secret|token|password|passwd|pwd)\s*[:=]\s*[''"]?[A-Za-z0-9._\-]{12,}[''"]?'
    placeholder_type: "secret"

  # ─── Internal codenames (extend per company) ──────────
  - id: "rule.internal_codename"
    description: "Internal project codenames (replace the example values as needed)"
    pattern: '\b(ProjectAtlas|OpKraken|InternalMercury)\b'
    placeholder_type: "codename"

# Global policies
policies:
  # Whether hits are recorded to audit.log (default: yes)
  audit_on_hit: true
  # If multiple rules match on the same line, use the earliest match's placeholder
  first_match_wins: true
  # Validation: after redaction, self-check with rule.pii_check; if anything still matches, mark the whole trace with redaction_warning
  post_check_required: true
