# Session meta template (conforms to schemas/session.schema.json)
# Copy to sessions/<session_id>/meta.yaml and fill in as needed

id: "sess_01J0Z9ZQXK7M6P3F0XK5K7C5K0"   # ULID; generated at runtime
schema_version: "1.0.0"

# Owner & collaborators
owner: "vicente@example.com"
collaborators: []                         # ["alice@example.com", "bob@example.com"]

# Referenced Playbook and Prompts
playbook:
  id: "pb_ticket_summary_zh"
  version: "1.2.0"
prompts:
  - id: "prompt_summary_zh"
    version: "0.4.1"

# Model & sampling
# Equivalent model_ref = "<provider_id>/<name>@<version>", e.g. "anthropic-claude/claude-sonnet-4-6@2026-04"
# See providers/SPEC.md
model:
  provider_id: "anthropic-claude"         # Registered in providers/templates/provider-registry
  kind: "anthropic"                       # ollama | openrouter | openai | anthropic | gemini | grok | openai_compatible
  name: "claude-sonnet-4-6"               # Includes the vendor prefix when routed via openrouter, e.g. "anthropic/claude-sonnet-4-6"
  version: "2026-04"                      # Explicit vendor version; latest / auto / stable forbidden
  alias_used: null                        # If resolved via @chat-strong etc., record the original alias
  params:
    temperature: 0.2
    top_p: 0.9
    max_tokens: 2000
    seed: 42                              # If supported by the model
  # sha256 of the provider config actually used; back-filled at runtime for audit and drift detection
  provider_config_hash: null

# State machine (see schema for allowed values)
status: "draft"                           # draft → active → ... → archived → purged

# Timestamps must be RFC3339 + UTC
created_at: "2026-05-01T10:00:00Z"
updated_at: "2026-05-01T10:00:00Z"

# Replay/branching: points to the parent Session (nullable)
parent_id: null

# Governance
retention_class: "medium"                 # low | medium | high | critical
sensitivity: "internal"                   # public | internal | confidential | restricted

# Free-form tags and k/v labels
tags: ["ticket", "zh-CN", "L1-support"]
labels:
  team: "service-desk"
  cost_center: "IT-OPS"
  pilot: "phase-1"

# Vendor extensions (optional; namespaces must use a vendor prefix)
extensions: {}
