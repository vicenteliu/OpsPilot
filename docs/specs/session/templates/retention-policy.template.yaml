# Default retention policy template
# Keep consistent with the overall retention policy in governance/.
# On expiry: clear inputs/ and artifacts/, keep meta.yaml + the audit.log summary.

version: "1.0.0"

# Retention classes
classes:
  low:
    description: "Public or low-sensitivity"
    retain_days: 90
    purge_action: "soft"          # soft = soft-purge (clear the body, keep meta); hard = purge everything (requires approval)
    audit_retain_days: 365

  medium:
    description: "Internal general; default class"
    retain_days: 30
    purge_action: "soft"
    audit_retain_days: 365

  high:
    description: "Sensitive (post-redaction)"
    retain_days: 7
    purge_action: "soft"
    audit_retain_days: 365

  critical:
    description: "Critical (incident/compliance)"
    retain_days: 1                 # Archive after 1 day by default; purge after archiving is decided manually
    purge_action: "manual_only"    # Must be triggered manually
    audit_retain_days: 730

# Mapping from data classification to the suggested retention class (may be overridden explicitly)
sensitivity_to_class_default:
  public: "low"
  internal: "medium"
  confidential: "high"
  restricted: "critical"

# Automatic purge schedule (recommended)
schedule:
  cron: "0 3 * * *"                # Daily scan at 03:00 local time
  timezone: "Asia/Shanghai"
  dry_run: true                     # Strongly recommend dry_run on first deployment; set to false once verified

# Manual ops
manual:
  archive_requires_owner: true      # Only the owner may archive
  delete_requires_two_person: true  # Purge requires two-person review
  export_before_purge: true         # Export a redacted summary to case-studies/ by default
