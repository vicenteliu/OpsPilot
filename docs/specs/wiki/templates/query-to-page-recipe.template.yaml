# Query→Page Recipe — write good session answers back as new wiki pages
# Key idea (from LLM Wiki): good answers should not vanish into chat history; make them part of the wiki.

version: "1.0.0"
recipe_kind: "wiki_query_to_page"

# 1. Triggers (any one produces a candidate)
triggers:

  # 1a. Strong: user explicitly accepts + high judge score
  on_user_accept_with_high_judge_score:
    enabled: true
    min_judge_score: 0.85
    sample_recent_sessions: 100                   # only scan the 100 most recent archived sessions

  # 1b. Medium: synthesis-style question (multiple kb.search calls)
  on_multi_search_session:
    enabled: true
    min_kb_searches_in_session: 2

  # 1c. Explicit: user pin
  on_user_pin:
    enabled: true                                 # user_action.pin_to_wiki appears in session.trace

# 2. Input extraction
extract:
  from_session: "<session_id>"
  capture:
    - "final_response_content"                    # session.trace[type=response, last]
    - "all_kb_search_results"                     # session.trace[type=tool_result, tool=kb.search]
    - "all_user_action_edits"                     # includes payload_diff, capturing the user's final rewrite
  redaction:
    enforce: true
    rules_ref: "session/templates/redaction-rules.template.yaml"

# 3. Kind decision
kind_decision:
  rules:
    # synthesis-style thesis (≥2 KB sources jointly supporting one claim) → synthesis
    - when:
        kb_sources_count: ">= 2"
        response_has_thesis: true                 # LLM statically analyzes whether final_response contains a thesis sentence
      kind: "synthesis"
    # comparison-style question (response contains a |...|...| markdown table or explicit vs/comparison keywords) → comparison
    - when:
        response_has_comparison_table: true
      kind: "comparison"
    # single-source summary (only 1 KB source; usually already generated at ingest time, rarely this path) → summary
    - when:
        kb_sources_count: 1
      kind: "summary"
    # default fallback
    - default: "synthesis"

# 4. Drafting
drafting:
  llm:
    model_ref: "anthropic-claude/claude-sonnet-4-6@2026-04"
    temperature: 0.2
  template_ref_by_kind:
    synthesis: "wiki/templates/synthesis-page.template.md"
    comparison: "wiki/templates/comparison-page.template.md"
    summary: "wiki/templates/summary-page.template.md"
  must_emit:
    - "frontmatter passing wiki-page.schema.json"
    - "Sources section listing all referenced KB chunks"
    - "Cross-links section connecting to existing pages"
    - "For synthesis: explicit Thesis + Counter-evidence + Gaps sections"
  budget_usd: 0.20

# 5. Review (stricter, because the source is a single session and may lack multi-source validation)
review:
  mode: "auto_then_human"                         # always human-reviewed; query→page is never fully-auto
  auto_checks:
    - "schema_valid"
    - "pii_check"
    - "no_prompt_injection"
    - "links_resolvable"
    - "no_existing_page_with_same_thesis"         # prevent duplicates; if one exists, suggest updating the old page instead of creating a new one
  duplicate_check:
    method: "embedding_similarity"
    threshold: 0.90
    on_match: "propose_update_instead"            # on match → do not create; suggest updating the original page
  reviewers:
    default: ["<session.owner>"]
  approval_timeout_hours: 72
  on_timeout: "discard"                           # discard if nobody reviews; no defer, since queries are time-sensitive

# 6. Safety
safety:
  block_classifications:
    - "restricted"                                # restricted content must never auto-generate pages from queries
  block_when_session_has_redaction_warning: true  # sessions with a redaction warning must never be written back
  block_when_judge_hard_fail: true                # sessions marked hard_fail by judge.llm are not allowed

# 7. Apply
apply:
  default_lifecycle_state: "draft"                # always enters draft first; goes live only after owner approval
  link_back_to_session: true                      # add a session reference to the page's derived_from.sources
  trigger_kb_re_register: true                    # register into the KB after going live
  emit_log_entry: true

# 8. Reporting
reporting:
  emit_summary_to_session: true
  metrics:
    - "page_created"
    - "would_have_duplicated"                     # number of duplicate-prevention check hits
    - "review_outcome"

# 9. Relation to skills iteration
# query→page failures (review reject / duplicate / safety block) are emitted as
# feedback_signal type=wiki_lint_issue into skills iteration — letting the
# wiki-maintainer skill improve itself.
