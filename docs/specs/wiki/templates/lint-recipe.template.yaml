# Wiki Lint Recipe — periodic wiki health check
# Key constraint: lint NEVER applies changes — it only emits issues + candidate patches into the review queue

version: "1.0.0"
recipe_kind: "wiki_lint"

# 1. Schedule
schedule:
  cron: "0 0 * * 1"                               # every Monday 00:00
  on_demand: true                                 # CLI: opspilot wiki lint
  on_ingest_completed: true                       # run incremental lint after every ingest
  incremental_window_pages: 30                    # incremental mode only inspects the 30 most recently touched pages

# 2. Scope
scope:
  wiki_root: "wiki/"
  namespaces:
    - "opspilot:public-kb"
  include_kinds: ["entity", "concept", "summary", "comparison", "synthesis"]
  exclude_meta_pages: false                       # index/log are exempt from orphan detection by default; other lint checks still run
  exclude_lifecycle_states: ["archived"]          # archived pages are excluded from lint

# 3. Checks
checks:

  # 3.1 Contradiction (high severity)
  - id: "contradiction"
    enabled: true
    severity_default: "high"
    method: "llm_pairwise"                        # run an LLM consistency check on each pair of related pages
    llm:
      model_ref: "anthropic-claude/claude-haiku-4-5@2025-10"   # judge model; version must be pinned
      temperature: 0.0
    pair_selection:
      strategy: "embedding_similarity_top_pairs"
      top_pairs: 50                               # scan the 50 most similar pairs across the wiki first
      min_similarity: 0.70
    output_relation_on_match: "contradicts"       # on match → auto-suggest link relation=contradicts

  # 3.2 Stale claim
  - id: "stale_claim"
    enabled: true
    severity_default: "high"
    method: "llm_against_recent_sources"
    recent_window_days: 30
    llm:
      model_ref: "anthropic-claude/claude-haiku-4-5@2025-10"
      temperature: 0.0

  # 3.3 Orphan
  - id: "orphan"
    enabled: true
    severity_default: "medium"
    method: "graph_inbound_count"
    threshold: 0                                  # report when inbound_link_count == 0
    exempt_pages: ["index", "log"]                # meta pages are exempt
    exempt_kinds_when_recently_created: []        # new pages are included too; they must be interlinked immediately upon creation

  # 3.4 Missing concept page
  - id: "missing_concept_page"
    enabled: true
    severity_default: "medium"
    method: "term_frequency_without_page"
    min_mention_pages: 3                          # mentioned by at least 3 pages but without its own page → report
    nlp:
      strategy: "named_entity_recognition + manual_term_list"
      term_list_ref: "wiki/_lint/terms-watchlist.yaml"

  # 3.5 Missing cross-ref
  - id: "missing_cross_ref"
    enabled: true
    severity_default: "low"
    method: "embedding_similarity_no_link"
    min_similarity: 0.85                          # strongly related but not cross-linked → report

  # 3.6 Duplicate concept
  - id: "duplicate_concept"
    enabled: true
    severity_default: "high"
    method: "embedding_similarity_high"
    min_similarity: 0.92                          # highly overlapping content → report as a merge candidate

  # 3.7 Broken link
  - id: "broken_link"
    enabled: true
    severity_default: "medium"
    method: "slug_resolution"

  # 3.8 Data gap (from unanswered queries)
  - id: "data_gap"
    enabled: true
    severity_default: "medium"
    method: "trace_failure_pattern"
    sources:
      - "session.trace where kb.search returned 0 hits"
      - "session.user_action where action == 'reject' && reason includes 'insufficient context'"
    min_occurrences: 3

  # 3.9 Redaction warning
  - id: "redaction_warning"
    enabled: true
    severity_default: "critical"                  # residual PII is a compliance incident
    method: "rule_based_pii_scan"
    rules_ref: "session/templates/redaction-rules.template.yaml"

  # 3.10 Schema invalid
  - id: "schema_invalid"
    enabled: true
    severity_default: "high"
    method: "jsonschema_validate"
    schema_ref: "wiki/schemas/wiki-page.schema.json"

# 4. Output
output:
  issues_path: "wiki/_lint/issues.jsonl"          # appended on every lint run; IDs are unique
  patches_dir: "wiki/_lint/patches/"              # candidate patch files (never applied)
  report_md: "wiki/_lint/report-<run_id>.md"      # human-readable report
  schema_ref: "wiki/schemas/lint-issue.schema.json"

# 5. Feedback signal injection
feedback_signal:
  enabled: true
  signal_type: "wiki_lint_issue"                  # aligned with skills/schemas/feedback-signal.schema.json
  weight_by_severity:
    low: 0.5
    medium: 1.5
    high: 3.0
    critical: 5.0
  target_skill: "wiki-maintainer@<latest>"        # which skill's iteration to route to
  redaction:
    enforce: true                                 # signals must pass redaction (reusing session rules)

# 6. Hard requirements
hard_requirements:
  - "Lint NEVER applies changes; only emits issues + candidate patches"
  - "Critical issues (redaction_warning) must page owner immediately"
  - "Issue id is content-addressed (lnt_<sha8> derived from issue_type + scope)"
  - "Resolved/dismissed issues stay in record (append-only); never delete"

# 7. Budget
budget:
  total_usd_per_run: 1.50
  max_pages_scanned_per_run: 500

# 8. Observability
metrics:
  - "issues_emitted_by_type"
  - "issues_emitted_by_severity"
  - "pages_scanned"
  - "cost_usd"
  - "latency_ms"
  - "feedback_signals_created"
