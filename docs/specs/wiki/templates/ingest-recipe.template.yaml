# Wiki Ingest Recipe — the flow for ingesting one raw source into the wiki
# Caller contract: first ingest the source into the KB via memory.ingestion to obtain a doc_id, then trigger this recipe

version: "1.0.0"
recipe_kind: "wiki_ingest"

# 1. Reference: the wiki instance this ingest targets
wiki_root: "wiki/"
namespace: "opspilot:public-kb"

# 2. Input
source:
  doc_id: "doc_88a277cf"                          # must already exist in the memory KB
  language: "zh-CN"
  classification: "internal"
  ingested_to_kb_at: "2026-05-01T10:00:00Z"

# 3. Context retrieval (first check what already exists in the wiki)
context_retrieval:
  # use the source's chunks as queries to hit existing wiki pages
  mode: "hybrid"
  scopes:
    - "opspilot:public-kb"
  filters:
    "extensions.wiki.page_kind":
      in: ["entity", "concept", "synthesis"]      # only the pages that could be affected
  top_k: 12
  rerank:
    enabled: true
    type: "cross_encoder"
    model_ref: "ollama-local/bge-reranker-v2-m3@2024-08"

# 4. Proposal
proposal:
  llm:
    model_ref: "anthropic-claude/claude-sonnet-4-6@2026-04"
    temperature: 0.2
  budget_usd: 0.30
  max_pages_touched: 15                           # aligned with the original LLM Wiki idea: a single-source ingest touches ≤15 pages
  must_consider:
    - "Are there contradictions with existing claims? → emit relation=contradicts links + lint signal"
    - "Are new entities/concepts introduced? → propose new pages"
    - "Are there ≥2 sources now supporting a thesis? → propose synthesis page"
    - "What page summary fits this source best? → propose 1 summary page"
  outputs_required:
    - "page_patches.json"                         # unified diff per page
    - "new_pages/*.md"                            # candidate new pages
    - "lint_candidates.jsonl"                     # potential lint issues found (not written immediately)

# 5. Static checks
static_checks:
  - "schema_valid"                                # all frontmatter passes wiki-page.schema.json
  - "pii_check"                                   # body + frontmatter pass redaction
  - "no_prompt_injection"                         # same static patterns as skills/lifecycle-policy
  - "no_orphan_creation"                          # a new page must have at least 1 candidate inbound link
  - "links_resolvable"                            # every [[<slug>]] resolves in the wiki (or is created in this same run)
  - "redaction_rules_version_match"               # all ≥ the current rules version

# 6. Review mode (decided by classification + source trust)
review:
  matrix:
    - when:
        classification: "public"
        source_trust: ["self_authored", "imported_trusted"]
      mode: "auto"
    - when:
        classification: "internal"
        source_trust: ["self_authored", "imported_trusted", "distilled"]
      mode: "auto_then_human"                     # write once automated checks pass; human reviews afterwards
    - when:
        classification_in: ["confidential", "restricted"]
      mode: "human"                               # mandatory human approval
    - when:
        source_trust: ["imported_community", "imported_unknown"]
      mode: "human"
  reviewers:
    default: ["vicente@example.com"]
  approval_timeout_hours: 48
  on_timeout: "defer"                             # defer | reject

# 7. Apply
apply:
  transactional: true                             # any subtask failure → full rollback
  steps:
    - "write_page_files"                          # write the page md files first
    - "compute_page_ids"                          # compute wpg_<sha8>
    - "rebuild_outbound_links"                    # parse [[<slug>]] to fill outbound_links
    - "update_index_md"
    - "append_log_md"
    - "register_back_to_kb"                       # see §8

# 8. Bi-directional with KB
register_back_to_kb:
  enabled: true                                   # wiki pages are auto-registered as KB docs with kind=wiki_synthesis
  conditions:
    only_if_lifecycle_state: "live"               # draft / reviewed never enter the KB
    skip_classifications: ["restricted"]          # restricted never enters the vector store
  doc_kind: "wiki_synthesis"
  embedding_model: "ollama-local/nomic-embed-text@2024-02"
  chunk_strategy: "headings_then_size"

# 9. Reporting
reporting:
  emit_summary_to_session: true                   # add a system event "wiki_ingest_done" to session.trace
  archive_run_to: "case-studies/wiki-ingests/"
  metrics:
    - "pages_created"
    - "pages_updated"
    - "lint_candidates_emitted"
    - "cost_usd"
    - "latency_ms"

# 10. Failure
on_failure:
  rollback_files: true                            # roll back all page files already written
  notify_owner: true
  emit_feedback_signal: true                      # the failure itself is also emitted as a wiki_lint_issue signal
