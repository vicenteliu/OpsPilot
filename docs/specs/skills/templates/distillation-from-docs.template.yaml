# Distillation Recipe — from existing markdown docs / SOPs / playbooks
# Convert human-written SOPs into executable skills, with references back to the original document

recipe_version: "1.0.0"
type: "from_docs"
run_id: null
ts: null

# 1. Sources
sources:
  doc_paths:
    - "playbooks/sop_vpn_zh.md"
    - "examples/scn_ticket_summary_zh/kb/sop_vpn_zh.md"
    # - "playbooks/runbook_*.md"   # globs allowed

# 2. Redaction
redaction:
  enforce: true
  rules_ref: "session/templates/redaction-rules.template.yaml"
  hard_fail_on_pii: true

# 3. Mining
mining:
  strategy: "llm_distill"
  min_support: 1
  llm_model: "anthropic-claude/claude-sonnet-4-6@2026-04"   # docs are complex, so use a strong model
  extract:
    - "trigger_phrases"                       # SOP applicability conditions → skill description
    - "tool_call_sequences"                   # command/tool steps in the SOP → requires.tools
    - "prompt_templates"                      # SOP step sections → skill body
    - "safety_constraints"                    # hard limits in the SOP → skill.safety + body

# 4. Drafting
drafting:
  target_format: "skill"                      # may also be "playbook" to emit the OpsPilot Playbook format
  template_ref: "skills/templates/SKILL.template.md"
  language: "zh-CN"
  max_body_chars: 4500
  must_emit:
    - "SKILL.md"
    - "tool-binding.yaml"

# 5. Review
review:
  mode: "auto_then_human"
  auto_checks:
    - "schema_valid"
    - "pii_check"
    - "description_length"
    - "no_prompt_injection"
    - "tool_resolvable"
  reviewers:
    - "vicente@example.com"

# 6. Register
register_as:
  trust: "distilled"
  lifecycle_state: "draft"
  registry_ref: "governance/skills/registry.yaml"

# 7. Budget
budget:
  total_usd: 1.00
  per_skill_max_usd: 0.40                     # doc-to-skill conversion usually costs more per unit (longer inputs)

# 8. Notes
# - Distilled skills must reference the original document as a resource, for auditability and traceability
# - If the SOP is marked classification=restricted, the distilled output inherits the same level by default
# - Repeatedly distilling the same document must not produce multiple skills; use the doc path as the dedup key
