# MCP server registry template
# Equivalent to schemas/mcp-config.schema.json
# Same standing as providers/templates/provider-registry (one manages models, the other manages "business tools")

version: "1.0.0"

mcps:

  # —— Local tool: filesystem-style stdio MCP ————————————
  - id: "fs-readonly"
    name: "Filesystem (read-only)"
    description: "Read files under workspace root; sandboxed deny-all by default."
    transport: "stdio"
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-filesystem", "${WORKSPACE_ROOT:-/workspace}"]
    env: {}
    tools_prefix: "mcp__fs__"
    tools_allowlist: ["read_file", "list_directory"]   # admit read-only tools only
    tools_denylist: null
    enabled: true
    trust: "trusted"
    auth:
      type: "none"
    compliance:
      data_residency: "unspecified"
      pii_allowed: false
      telemetry_optout: true
    health_probe:
      interval_seconds: 600
      method: "list_tools"
      failure_threshold: 3
    limits:
      rpm: 60
      concurrent: 4
      monthly_budget_usd: 0

  # —— Notion (cloud SaaS) ————————————————
  - id: "notion-main"
    name: "Notion (main workspace)"
    description: "Create / read pages and databases in the main Notion workspace."
    transport: "stdio"
    command: "npx"
    args: ["-y", "@notionhq/mcp-server"]
    env:
      NOTION_TOKEN: "${NOTION_API_KEY}"          # must be an env placeholder; inlining forbidden
    tools_prefix: "mcp__notion__"
    tools_allowlist: null
    tools_denylist: ["delete_page", "delete_database"]   # protects against accidental deletion
    enabled: false                                # off by default; enable on demand
    trust: "trusted"
    auth:
      type: "bearer_env"
      env: "NOTION_API_KEY"
      header: "Authorization"
    compliance:
      data_residency: "us"
      pii_allowed: false
      telemetry_optout: true
    health_probe:
      interval_seconds: 600
      method: "list_tools"
      failure_threshold: 3
    limits:
      rpm: 30
      concurrent: 4
      monthly_budget_usd: 5

  # —— Remote HTTP MCP example ————————————————
  - id: "internal-search-http"
    name: "Internal search service"
    transport: "http"
    url: "https://search.corp.local/mcp"
    headers:
      Authorization: "Bearer ${CORP_SEARCH_TOKEN}"
    env: {}
    tools_prefix: "mcp__corpsearch__"
    enabled: false
    trust: "trusted"
    auth:
      type: "bearer_env"
      env: "CORP_SEARCH_TOKEN"
      header: "Authorization"
    compliance:
      data_residency: "cn"
      pii_allowed: false
      telemetry_optout: true
    health_probe:
      interval_seconds: 300
      method: "list_tools"
      failure_threshold: 2
    limits:
      rpm: 60
      concurrent: 8
      monthly_budget_usd: 0

# Global policy
global_policy:
  default_deny_on_disabled: true              # validated at load time: a disabled MCP's tools are refused binding even if a skill references them
  block_secrets_in_env_literals: true         # refuse to load if an env field value matches a plaintext secret pattern (API_KEY=xyz...)
  audit_every_call: true                      # every MCP call is written to session.audit.log
