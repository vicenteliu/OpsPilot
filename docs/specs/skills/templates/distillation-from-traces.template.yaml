# Distillation Recipe — from session traces
# Distill skill drafts from OpsPilot's own session.trace.jsonl collections
# Equivalent to schemas/distillation-recipe.schema.json

recipe_version: "1.0.0"
type: "from_traces"
run_id: null                          # assigned at runtime (run_dist_<ULID20>)
ts: null

# 1. Sources
sources:

  # Option A: list session_ids explicitly
  session_ids: []
  #   - "sess_01J0Z9ZQXK7M6P3F0XK5K7C5K0"
  #   - "sess_01K1A0AQXM7N7Q4G1YK6K8D6M0"

  # Option B: filter by criteria (complements A; when session_ids is empty, select by these filter rules)
  session_filter:
    playbook: "pb_ticket_summary_zh"          # only Sessions from this Playbook
    min_harness_score: 0.85                    # only Sessions with Harness score ≥0.85 (ensures "successful samples")
    since: "2026-04-01T00:00:00Z"
    until: "2026-04-30T23:59:59Z"
    tags_any_of: ["L1-support"]

# 2. Redaction (hard constraint)
redaction:
  enforce: true
  rules_ref: "session/templates/redaction-rules.template.yaml"
  hard_fail_on_pii: true                      # PII check failure → abort the whole pipeline

# 3. Mining
mining:
  strategy: "hybrid"                          # pattern_mining + llm_distill combined
  min_support: 5                              # only extract patterns appearing in at least 5 Sessions
  llm_model: "anthropic-claude/claude-haiku-4-5@2025-10"   # version must be pinned
  extract:
    - "trigger_phrases"                       # which user inputs triggered successful responses
    - "tool_call_sequences"                   # the kb.search → artifact.write ordering
    - "prompt_templates"                      # shared prompt structure
    - "output_schemas"                        # field sets of the output JSON
    - "citation_style"                        # citation injection style
    - "safety_constraints"                    # conditions that triggered refusal/approval

# 4. Drafting
drafting:
  target_format: "skill"
  template_ref: "skills/templates/SKILL.template.md"
  language: "zh-CN"
  max_body_chars: 4000
  must_emit:
    - "SKILL.md"
    - "tool-binding.yaml"
    - "trigger-fixtures.jsonl"                # used for the subsequent trigger eval

# 5. Review
review:
  mode: "auto_then_human"                     # after automatic checks pass, enters the human review queue
  auto_checks:
    - "schema_valid"                          # SKILL.md frontmatter passes skill.schema.json
    - "pii_check"                             # body passes rule.pii_check
    - "description_length"                    # ≤300 chars
    - "no_prompt_injection"                   # static scan
    - "tool_resolvable"                       # requires.tools/mcps all resolvable
    - "trigger_eval"                          # run the trigger fixtures
  trigger_eval:
    fixtures_ref: "examples/scn_ticket_summary_zh/harness/fixture.json"
    min_recall: 0.9
    max_false_positive: 0.05
  reviewers:
    - "vicente@example.com"

# 6. Register
register_as:
  trust: "distilled"                           # going straight to imported_trusted is forbidden (must be promoted manually)
  lifecycle_state: "draft"                     # can only enter draft; a human switches it to reviewed after review passes
  registry_ref: "governance/skills/registry.yaml"   # actual path of the main registry

# 7. Budget
budget:
  total_usd: 1.50                              # total budget for the whole pipeline run
  per_skill_max_usd: 0.30                      # a single skill draft must not exceed this
