# Distillation Recipe — from other skill collections
# Learn shared structure and style from external skill libraries (anthropic-skills, community repos, etc.)

recipe_version: "1.0.0"
type: "from_skills"
run_id: null
ts: null

# 1. Sources
sources:
  skill_refs:
    # - "anthropic-skills:docx@1.0.0"
    # - "anthropic-skills:pptx@1.0.0"
    # - "data:analyze@1.0.0"
    # - "data:explore-data@1.0.0"
    # - "legal:contract-review@1.0.0"

# 2. Redaction
redaction:
  enforce: true
  rules_ref: "session/templates/redaction-rules.template.yaml"
  hard_fail_on_pii: true                      # third-party skill descriptions / bodies must be scanned too

# 3. Mining
mining:
  strategy: "llm_distill"                     # rely mainly on the LLM to abstract commonalities
  min_support: 1                               # skill counts are usually small, so relax this
  llm_model: "anthropic-claude/claude-haiku-4-5@2025-10"
  extract:
    - "trigger_phrases"                       # shared description style
    - "prompt_templates"                      # body section structure
    - "safety_constraints"                    # shared safety sections

# 4. Drafting
drafting:
  target_format: "skill"
  template_ref: "skills/templates/SKILL.template.md"
  language: "en"                               # multi-skill sources usually use English
  max_body_chars: 3000
  must_emit:
    - "SKILL.md"

# 5. Review
review:
  mode: "human"                                # borrowing from others' skills requires human review of copyright and style
  auto_checks:
    - "schema_valid"
    - "no_prompt_injection"
  reviewers:
    - "vicente@example.com"

# 6. Register
register_as:
  trust: "distilled"                           # even if the source is imported_trusted, the distilled output still goes through distilled
  lifecycle_state: "draft"
  registry_ref: "governance/skills/registry.yaml"

# 7. Budget
budget:
  total_usd: 0.80
  per_skill_max_usd: 0.20

# 8. Copyright & Attribution notes (important)
# - If content from an imported_trusted source skill is rewritten into a new skill, distillation.sources must list all of them
# - Do not copy a third-party skill's description verbatim (may infringe or mis-trigger)
# - If the new skill overlaps heavily with a source skill, mark it as a fork of that skill rather than a new one
