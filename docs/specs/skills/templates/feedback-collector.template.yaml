# Feedback Collector — feedback source config
# Collects multi-source signals into skills/feedback/<skill_ref>/signals.jsonl for iteration trigger decisions

version: "1.0.0"

# 1. Master switch
enabled: true

# 2. Storage
storage:
  signals_path_pattern: "skills/feedback/{skill_ref_safe}/signals.jsonl"
  signals_index_path: "skills/feedback/_index.sqlite"   # optional; for fast lookup by skill_ref + time window
  retention:
    days: 365                                     # keep signals for 1 year (for audit)
    aggregation_cache_days: 60                    # the aggregated-weight cache only covers the last 60 days

# 3. Signal sources (multiple)
sources:

  # 3.1 Session traces — extract user_action and trace_failure from session.trace.jsonl
  - id: "src_session_trace"
    type: "session_trace"
    enabled: true
    scan:
      session_status_in: ["archived"]              # only scan archived Sessions (avoids interfering with live ones)
      since_relative: "30d"
    extracts:
      - signal_type: "user_action.accept"
        when: "trace.event.type == 'user_action' && trace.event.action == 'accept'"
        weight: 1.0
      - signal_type: "user_action.reject"
        when: "trace.event.type == 'user_action' && trace.event.action == 'reject'"
        weight: -2.0
      - signal_type: "user_action.edit"
        when: "trace.event.type == 'user_action' && trace.event.action == 'edit'"
        weight: -1.0
        capture_diff: true                         # store the payload_diff via an Artifact reference
      - signal_type: "trace_failure"
        when: "trace.event.type == 'tool_result' && trace.event.status in ('failed','timeout','aborted')"
        weight: -2.0

  # 3.2 Harness results — score deltas produced after regression runs
  - id: "src_harness"
    type: "harness_results"
    enabled: true
    scan:
      since_relative: "30d"
      result_path_pattern: "harness-data/runs/{run_id}/results.jsonl"
    extracts:
      - signal_type: "harness_score"
        # a drop of more than 0.02 vs the baseline weighted score counts as a negative signal
        when: "delta.weighted < -0.02"
        weight_formula: "delta.weighted * 5"       # strong signal; amplified 5x

  # 3.3 Distillation pipeline — new patterns discovered during distillation
  - id: "src_distillation"
    type: "distillation_run"
    enabled: true
    scan:
      since_relative: "30d"
    extracts:
      - signal_type: "distillation_pattern"
        when: "pattern.support >= 5 && pattern.divergence_from_existing > 0.4"
        weight: 1.0
        capture_pattern_summary: true

  # 3.4 Model upgrade — detected from providers/catalogs.md or registry diffs
  - id: "src_model_upgrade"
    type: "model_drift"
    enabled: true
    method: "trigger_eval_diff"                    # after a model upgrade, run the trigger eval and compare
    extracts:
      - signal_type: "model_drift"
        when: "drift_metric.before - drift_metric.after > 0.05"
        weight_formula: "(before - after) * 30"

# 4. Redaction (hard constraint)
redaction:
  enforce: true
  rules_ref: "session/templates/redaction-rules.template.yaml"
  hard_fail_on_pii: true
  # a signal itself must not carry raw prompt / response text
  forbidden_fields_in_signal:
    - "raw_prompt"
    - "raw_response"
    - "raw_content"
  # user_action.edit diffs must be redacted before going through an Artifact
  diff_redaction_required: true

# 5. Aggregation
aggregation:
  decay:
    enabled: true
    half_life_days: 14
  window:
    days: 30
  weight_clamp:
    min_per_signal: -5.0
    max_per_signal: +5.0
  # per-signal_type weight overrides (replace the defaults)
  type_overrides:
    "harness_score": 5.0                           # works together with the source's weight_formula
    "model_drift": 3.0
    "trace_failure": 2.0

# 6. Trigger hooks
trigger_hooks:
  # when the aggregated |weight| ≥ feedback_min_weight_to_trigger
  on_threshold_reached:
    enabled: true
    create_iteration_recipe: true                  # automatically emit an iteration-recipe (draft)
    notify:
      channels: []                                 # e.g. ["#opspilot-skills"]

  on_regression_detected:                          # strong signals from src_harness trigger immediately
    enabled: true
    create_iteration_recipe: true

# 7. Security
safety:
  audit_every_signal_capture: true
  max_signals_per_skill_per_day: 1000              # DoS protection (maliciously fabricated bulk user_action signals)
  rate_limit_per_session: 50
  drop_duplicates_within_minutes: 5

# 8. Failure handling
on_source_unavailable: "skip_with_warning"          # skip_with_warning | block_pipeline
on_redaction_failure: "drop_signal"                 # reject signals that may carry PII
