# Iteration Recipe — single iteration config
# Equivalent to schemas/iteration.schema.json (recipe form; the evaluation + decision sections are backfilled after the run)

id: "itr_01J0Z9ZQXK7M6P3F0XK5K7C5IT0"            # ULID assigned at runtime
skill_ref: "ticket_summary_zh@1.2.0"
ts: "2026-05-01T12:00:00Z"

# 1. Trigger (required)
trigger:
  type: "feedback_signal"                         # regression_detected | feedback_signal | distillation_candidate | model_upgrade | scheduled | manual
  source_run: null
  feedback_window_signals:                        # the set of signal ids that triggered this iteration
    - "fb_01J0Z9ZQXK7M6P3F0XK5K7C5SG1"
    - "fb_01J0Z9ZQXK7M6P3F0XK5K7C5SG2"
    - "fb_01J0Z9ZQXK7M6P3F0XK5K7C5SG3"
  distillation_run: null
  model_upgrade: null
  manual_actor: null

# 2. Hypothesis (required, 10-500 characters)
hypothesis: |
  Recent user_action.edit signals show users frequently rewriting
  next_actions to add explicit "ask user for X" steps when log fields
  are missing. Adding a missing-field branch to the body should
  reduce edit rate without hurting trigger recall.

# 3. Proposed changes (required; change only 1-2 fields per iteration for clean attribution)
proposed_changes:
  - field: "body"
    kind: "append"
    diff_ref: "iterations/itr_01J0Z9ZQXK7M6P3F0XK5K7C5IT0/body.patch"
    rationale: "Append a 'missing-field handling' subsection; do not touch description"

  # anti-pattern reminder: do not change description + body + requires.tools at the same time
  # - field: "description"
  #   kind: "tighten"

# 4. Variants (filled in by the propose stage at runtime; the recipe stage may just declare the planned count)
variants_created: []                              # e.g. ["var_a1b2c3d4", "var_e5f6g7h8"]

# 5. Evaluation config (baseline_run / variant_runs / verdicts backfilled after the run)
evaluation:
  fixtures:                                       # which Fixtures to run
    - "fix_a1b2c3d4"
    - "fix_b2c3d4e5"
  anchor_fixtures:                                # no regression allowed on these (required for promotion)
    - "fix_a1b2c3d4"
  baseline_run: null                              # run_id filled in at runtime
  variant_runs: []                                # per-variant results filled in at runtime

# 6. Decision (filled in after the run)
decision:
  outcome: null                                   # promote | reject | merge | iterate_again
  promoted_variant_id: null
  merged_variant_ids: []
  next_iteration_hypothesis: null
  decided_by: null
  decided_at: null
  approval_chain: []
  notes: null

# 7. Applied (filled in after promotion)
applied:
  new_skill_version: null
  registry_updated_at: null
  lineage_entry_added: false
  rollback_window_until: null
