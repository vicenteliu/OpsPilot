# Skill lifecycle & trust policy
# Companion to SPEC.md §1.1 (Trust tiers) + §8 (Lifecycle Operations)

version: "1.0.0"

# 1. Trust tiers & default permissions
trust_tiers:

  self_authored:
    description: "Written by a local author"
    default_state: "draft"
    can_call:
      builtin_read: true
      builtin_write: true
      mcp: true
      sandbox: true
    require_per_call_approval:
      write: false
      sensitive: true

  distilled:
    description: "Distilled from internal traces/docs/skills; passed local review"
    default_state: "draft"
    can_call:
      builtin_read: true
      builtin_write: true
      mcp: true
      sandbox: true
    require_per_call_approval:
      write: true                       # distilled output requires approval for write actions by default
      sensitive: true

  imported_trusted:
    description: "Imported from trusted sources (allowlisted orgs/authors)"
    default_state: "reviewed"
    can_call:
      builtin_read: true
      builtin_write: true
      mcp: true
      sandbox: true
    require_per_call_approval:
      write: false
      sensitive: true

  imported_community:
    description: "Community / unaudited sources; sandbox isolation enforced"
    default_state: "draft"
    can_call:
      builtin_read: true                # read-only
      builtin_write: false
      mcp: false
      sandbox: true                     # only read-only sandbox allowed
    require_per_call_approval:
      read: false
      execute: true
      write: true                       # even if permitted, approve every call
      sensitive: true
    sandbox_class_allowlist:
      - "shell.read_only"
      - "sql.readonly"
    network_default: "deny-all"

  imported_unknown:
    description: "Unknown origin; invocation denied by default"
    default_state: "draft"
    enabled_by_default: false
    can_call:
      builtin_read: false
      builtin_write: false
      mcp: false
      sandbox: false
    notes: "Requires explicit user opt-in to be promoted to the imported_community tier"

# 2. Operations
operations:

  install:
    require_pii_check: true             # statically scan SKILL.md before loading
    require_schema_valid: true
    require_no_prompt_injection: true
    default_lifecycle_state: "draft"
    on_checksum_mismatch: "reject"      # SKILL.md checksum differs from the registry's → refuse to load

  enable:
    require_trigger_eval_pass: true     # must pass the trigger eval first (recall ≥0.9, FP ≤0.05)
    require_dependencies_resolvable: true   # requires.tools / mcps / providers all in place
    on_failure: "stay_in_reviewed"

  update:
    require_diff_review: true           # the diff against the previous version must be human-reviewed
    require_regression_eval: true       # harness runs the existing Fixtures; a score drop >3% blocks the update
    backup_previous_version: true       # snapshot the old version before upgrading, for easy rollback

  deprecate:
    require_migration_note: true        # a note on which skill to migrate to is mandatory
    grace_period_days: 30               # still invocable during the 30-day grace period (with a warning)

  uninstall:
    require_two_person_for_trusted: true
    cascade_disable_dependents: true    # other skills depending on this one are auto-disabled

# 3. Audit
audit:
  log_every_invocation: true            # write one audit record per skill trigger
  log_every_install: true
  log_every_state_change: true
  retention_days: 365

# 4. Static security checks (run at load time)
static_checks:

  # The last two patterns match Chinese prompt-injection phrases
  # ("ignore the previous/above instructions", "you are now ...");
  # CJK characters are written as \u escapes to keep this file ASCII-only.
  prompt_injection_patterns:
    - "(?i)\\bignore (?:all )?previous (?:instructions|messages)\\b"
    - "(?i)\\bdisregard (?:all )?(?:prior|above|earlier)\\b"
    - "(?i)\\byou are now (?:a )?(?:different|new)\\b"
    - "(?i)\\bsystem (?:prompt|message)\\b.*(?:override|replace|change)"
    - "(?i)\u5FFD\u7565(?:\u4E4B\u524D|\u4EE5\u4E0A|\u4E0A\u9762)\u7684(?:\u6307\u4EE4|\u63D0\u793A)"
    - "(?i)\u4F60\u73B0\u5728(?:\u662F|\u626E\u6F14)"

  description_must_have:
    - "verb"                            # a trigger verb (summarize/draft/triage etc.)
    - "object_or_trigger"               # the object being handled, or the trigger condition

  description_must_not_have:
    - "always use"
    - "must use"
    - "preferred over"                  # attempts to tamper with routing priority

  body_must_not_have:
    - "system_prompt:"                  # embedding system-prompt redefinitions is forbidden
    - "<|im_start|>system"
    - "<|system|>"

# 5. Tier escalation / de-escalation
tier_transitions:
  allowed:
    - { from: "imported_unknown",   to: "imported_community", requires: ["explicit_user_opt_in"] }
    - { from: "imported_community", to: "imported_trusted",   requires: ["security_review", "two_person_approval"] }
    - { from: "draft",              to: "reviewed",           requires: ["auto_checks_pass", "human_review"] }
    - { from: "reviewed",           to: "trusted",            requires: ["trigger_eval_pass"] }
  forbidden:
    - { from: "imported_unknown",   to: "imported_trusted" }   # skipping a trust tier is forbidden
    - { from: "*",                  to: "self_authored" }      # self_authored can only be set at creation
