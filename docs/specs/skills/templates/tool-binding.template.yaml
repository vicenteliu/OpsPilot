# Skill tool/MCP binding template
# Equivalent to schemas/tool-binding.schema.json
# Lives inside each skill directory: skills/repo/<skill_name>/tool-binding.yaml

skill_ref: "ticket_summary_zh@1.2.0"

bindings:

  # —— Builtin tools ——————————————————
  - tool: "kb.search"
    kind: "builtin"
    safety_class: "read"
    approval_required: false
    rate_limit:
      rpm: 30
      per_session_max: 10
    timeout_ms: 5000
    config:
      default_scopes: ["opspilot:public-kb"]
      default_top_k: 8
      default_mode: "hybrid"
      default_rerank:
        enabled: true
        type: "cross_encoder"
        top_n: 4
        model_ref: "ollama-local/bge-reranker-v2-m3@2024-08"

  - tool: "artifact.write"
    kind: "builtin"
    safety_class: "write"
    approval_required: false        # writing to this Session's own artifact area is allowed by default
    timeout_ms: 5000
    config:
      schema_name: "ticket_summary_v1"
      max_size_bytes: 32768

  # —— MCP tool example (not actually used by this skill; shown for shape only) ——————————
  # - tool: "mcp__notion__create_page"
  #   kind: "mcp"
  #   mcp_id: "notion-main"
  #   safety_class: "write"
  #   approval_required: true       # third-party write action → approval enforced
  #   rate_limit:
  #     rpm: 10
  #     per_session_max: 3
  #   timeout_ms: 10000
  #   config:
  #     default_database_id: "${NOTION_DB_ID}"
  #     default_visibility: "team"

  # —— Sandbox action example ——————————————————
  # - tool: "shell.exec"
  #   kind: "sandbox"
  #   sandbox_class: "shell.read_only"   # see sandbox/policies/resource-quota.template.yaml
  #   safety_class: "execute"
  #   approval_required: true
  #   timeout_ms: 30000
  #   config:
  #     allowed_commands_regex: "^(grep|cat|tail|head|jq|wc) "
  #     network: "deny-all"

# Global policy
global_policy:
  deny_on_unknown_tool: true                    # tools not declared in SKILL.md.requires must not be called
  max_total_calls_per_invocation: 12            # cap on total tool calls per skill invocation
  max_total_cost_usd_per_invocation: 0.05       # includes LLM tokens and MCP billing
