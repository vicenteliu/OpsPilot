# Eval run config template
# Copy to harness-data/runs/<run_id>/config.yaml; running it produces results.jsonl + report.*

version: "1.0.0"

run:
  id: "run_01J0Z9ZQXK7M6P3F0XK5K7C5K0"   # ULID; generated at run time
  name: "weekly-regression-2026W18"
  triggered_by: "ci"                       # ci | manual | nightly
  ts: "2026-05-01T02:00:00Z"

# Scenarios
scenarios:
  - id: "scn_ticket_summary_zh"
    fixtures:
      include_tags: ["L1", "zh-CN"]
      exclude_tags: ["wip"]
      ids: []                              # empty = selected by the tags above
    rubric: "rubrics/scn_ticket_summary_zh.md"

  - id: "scn_log_triage_en"
    fixtures:
      include_tags: ["nginx", "k8s"]
    rubric: "rubrics/scn_log_triage_en.md"

# Playbook(s)
playbooks:
  - id: "pb_ticket_summary_zh"
    versions: ["1.1.0", "1.2.0"]           # run both versions and compare for regressions

# Model matrix
# Format = <provider_id>/<name>@<version>; provider_id comes from providers/templates/provider-registry
# Registry aliases (e.g. @chat-strong / @judge) are also allowed; the runner resolves them before execution
models:
  - "anthropic-claude/claude-sonnet-4-6@2026-04"
  - "openai-main/gpt-4o@2024-11-20"
  - "openrouter-main/google/gemini-2.5-pro@2025-03"
  - "grok-main/grok-3@2025-02"
  - "ollama-local/qwen2.5:14b-instruct@2024-09"

# Evaluators
evaluators:
  - id: "ev_pii_check"
    type: "rule.pii_check"
    weight: 0.0                            # hard-fail only; not counted in the weighted score
    hard_fail: true
    rules_ref: "../session/templates/redaction-rules.template.yaml"

  - id: "ev_must_contain"
    type: "rule.regex"
    weight: 0.10
    config:
      from_golden: true                    # taken automatically from golden.must_contain
      mode: "all"

  - id: "ev_must_not_contain"
    type: "rule.regex"
    weight: 0.0
    hard_fail: true
    config:
      from_golden: true                    # taken automatically from golden.must_not_contain
      mode: "none"

  - id: "ev_schema"
    type: "rule.json_schema"
    weight: 0.20
    config:
      schema_ref: "schemas/scn_ticket_summary_v1.json"

  - id: "ev_semantic"
    type: "semantic.embedding"
    weight: 0.20
    config:
      embedding_model: "openai/text-embedding-3-large@2025-01"
      threshold_cosine: 0.78

  - id: "ev_judge"
    type: "judge.llm"
    weight: 0.50
    config:
      judge_model: "anthropic/claude-haiku-4-5@2025-10"   # version must be pinned
      judge_prompt_hash: "sha256:0000...required"
      rubric_ref: "rubrics/scn_ticket_summary_zh.md"

# Thresholds & gate
thresholds:
  pass_rate_min: 0.85                      # pass-rate threshold
  regression_delta_max: -0.03              # block on a 3% drop vs baseline
  cost_per_run_usd_max: 1.50
  latency_p95_ms_max: 9000

baseline:
  run_id: "run_01J0Z0Z0Z0Z0Z0Z0Z0Z0Z0Z0Z0"
  source: "main-branch-last-green"

# Retries
retries:
  on_evaluator_failure: 0
  on_infra_error: 2
  flake_detection:
    enabled: true
    repeats: 3
    flag_if_variance_gt: 0.1

# Reports
report:
  formats: ["md", "json"]                  # html not required for now
  archive_to: "case-studies/regressions/"

# CI
ci:
  block_merge_on_gate_fail: true
  notify:
    on_regression: ["#opspilot-alerts"]
    on_green: []
