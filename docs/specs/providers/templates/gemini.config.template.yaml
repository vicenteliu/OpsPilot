# Google Gemini provider config template
# Docs: https://ai.google.dev/docs (as of 2026-05-01; verify before use)
# Two access paths:
#   1) Generative Language API: API key (this template's default)
#   2) Vertex AI: OAuth2 service account (suited to enterprise/GCP scenarios; switch deployment_mode)

id: "gemini-main"
kind: "gemini"
display_name: "Google Gemini"
enabled: true

# Generative Language API endpoint
base_url: "https://generativelanguage.googleapis.com/v1beta"

auth:
  # Default: API key via query string (Google style)
  type: "api_key_query"
  env: "GEMINI_API_KEY"
  query_param: "key"
  # When going through Vertex AI, switch to:
  # type: "oauth2_service_account"
  # key_file_env: "GOOGLE_APPLICATION_CREDENTIALS"

default_headers: {}

capabilities:
  streaming: true
  tools: true                          # function calling
  vision: true
  audio_in: true
  audio_out: false                     # TTS goes through a separate API
  json_mode: true                      # responseSchema / responseMimeType=application/json
  prompt_caching: true                 # context caching (requires explicitly creating a cache)
  reasoning_mode: true                 # gemini-2.5 thinking mode (model-dependent)
  computer_use: false
  embeddings: true                     # text-embedding-004 etc.
  long_context_tokens: 1000000         # gemini-2.5-pro scale; the catalog is authoritative
  max_output_tokens: 8192

limits:
  context_window_tokens: 1000000
  max_output_tokens: 8192
  rpm: 60
  tpm: 1000000
  concurrent: 8

cost:
  # Note: above the long-context threshold Gemini switches to a different pricing tier (more expensive beyond 128k)
  pricing:
    input_per_1k_usd: 0.00125          # approximate short-context tier
    output_per_1k_usd: 0.005
    cached_input_per_1k_usd: 0.0003125
    pricing_as_of: "2026-05-01"
    source_url: "https://ai.google.dev/pricing"
  monthly_budget_usd: 50
  per_call_budget_usd: 0.5
  on_budget_exceeded: "block"
  downgrade_to: "openrouter-main"

retry:
  max_attempts: 3
  initial_backoff_ms: 500
  max_backoff_ms: 8000
  jitter: "full"
  retry_on:
    - "http_408"
    - "http_429"
    - "http_500"
    - "http_502"
    - "http_503"
    - "http_504"
    - "timeout_read"
  give_up_on: ["http_400", "http_401", "http_403", "http_404", "http_413"]

timeouts:
  connect_ms: 5000
  read_ms: 60000
  total_ms: 120000                     # long context + thinking mode can be slow

compliance:
  data_residency: "us"                 # Generative Language API; Vertex offers region selection
  telemetry_optout: true               # free tier may use data for training; paid tier does not by default — official policy is authoritative
  zero_data_retention: false
  pii_allowed: false                   # denied by default
  red_lines:
    - "Never send any sensitive data on the free (unpaid) tier"
    - "Never send unredacted PII"

labels:
  region: "global"

extensions:
  gemini:
    deployment_mode: "generative_language"   # generative_language | vertex
    # vertex_project: "<gcp-project>"
    # vertex_location: "us-central1"
    # Safety filtering (per official enum values; overly strict filtering changes output)
    safety_settings:
      - category: "HARM_CATEGORY_DANGEROUS_CONTENT"
        threshold: "BLOCK_MEDIUM_AND_ABOVE"
      - category: "HARM_CATEGORY_HARASSMENT"
        threshold: "BLOCK_MEDIUM_AND_ABOVE"
      - category: "HARM_CATEGORY_HATE_SPEECH"
        threshold: "BLOCK_MEDIUM_AND_ABOVE"
      - category: "HARM_CATEGORY_SEXUALLY_EXPLICIT"
        threshold: "BLOCK_MEDIUM_AND_ABOVE"
    # thinking mode (if applicable)
    thinking:
      enabled: false
      thinking_budget: 0
