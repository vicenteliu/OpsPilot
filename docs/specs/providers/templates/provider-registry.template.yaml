# Provider registry template
# Top-level entry point; session/harness reference concrete providers via provider_id.
# For real deployments, place this under governance/providers/ to avoid mixing it up with the templates.

version: "1.0.0"

# Registered provider instances (each must satisfy schemas/provider-config.schema.json)
# Scattered yaml files are pulled in via $include; provider_refs below is an implementation-layer convention (not enforced by this repository)
provider_refs:
  - "providers/templates/ollama.config.template.yaml"
  - "providers/templates/openrouter.config.template.yaml"
  - "providers/templates/openai.config.template.yaml"
  - "providers/templates/anthropic.config.template.yaml"
  - "providers/templates/gemini.config.template.yaml"
  - "providers/templates/grok.config.template.yaml"

# Default provider (used when no routing is declared)
default_provider: "ollama-local"

# Model shorthand aliases
# Playbooks reference @chat-strong / @judge / @local-fast instead of concrete models, making switches easy
aliases:
  "@chat-strong":  "anthropic/claude-sonnet-4-6@2026-04"   # verify against catalogs.md before use
  "@chat-fast":    "openai/gpt-4o-mini@2024-07-18"
  "@judge":        "anthropic/claude-haiku-4-5@2025-10"
  "@local-fast":   "ollama/qwen2.5:7b-instruct@2024-09"
  "@local-strong": "ollama/qwen2.5:14b-instruct@2024-09"
  "@vision":       "gemini/gemini-2.5-pro@2025-03"
  "@live-search":  "grok/grok-3@2025-02"

# Routing strategy (pick exactly one as the top level; multiple strategies can be layered per scenario in rules)
routing:
  strategy: "fixed"                    # fixed | fallback | capability | cost-aware

  # —— fallback strategy: primary/backup chain ————————————————————————
  fallback_chain:
    - "anthropic-claude"
    - "openrouter-main"
    - "ollama-local"

  # —— capability strategy: declarative filtering ————————————————————
  capability_rules:
    - when: "playbook.requires.tools == true"
      candidates: ["openai-main", "anthropic-claude", "grok-main"]
    - when: "playbook.requires.long_context >= 200000"
      candidates: ["anthropic-claude", "gemini-main"]
    - when: "playbook.requires.local == true || session.sensitivity == 'restricted'"
      candidates: ["ollama-local"]

  # —— cost-aware strategy: cheapest among capability-satisfying candidates ————————————
  cost_aware:
    enabled: false
    prefer: "output_per_1k_usd"
    constraints:
      min_capabilities: ["streaming", "json_mode"]

  # Universal rules (apply regardless of strategy)
  hard_constraints:
    # Force local when data must stay on-network
    - when: "session.sensitivity in ['confidential', 'restricted']"
      must_be_local: true
    # Providers that disallow PII must not receive Sessions carrying a redaction warning
    - when: "session.flags includes 'redaction_warning'"
      require_pii_allowed: true

# Global policies
global:
  log_provider_config_hash_to_audit: true   # write the config hash hit by each call into the audit
  refuse_on_version_unset: true              # @latest / empty version is always refused
  monthly_budget_total_usd: 200              # combined budget across all providers (an extra outermost gate)
  on_total_budget_exceeded: "block"

# Health probe (convention only; the implementation layer runs it periodically)
health_probe:
  interval_seconds: 300
  prompt: "ping"                       # minimal prompt
  required_pass: 1                     # fail N times → enabled=false
  failure_threshold: 3
