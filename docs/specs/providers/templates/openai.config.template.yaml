# OpenAI provider config template
# Docs: https://platform.openai.com/docs (as of 2026-05-01; verify before use)

id: "openai-main"
kind: "openai"
display_name: "OpenAI"
enabled: true

base_url: "https://api.openai.com/v1"

auth:
  type: "api_key_header"
  env: "OPENAI_API_KEY"
  header: "Authorization"
  prefix: "Bearer "

# Optional: organization/project isolation
default_headers:
  # OpenAI-Organization: "${OPENAI_ORG_ID}"     # optional; required by some organization accounts
  # OpenAI-Project: "${OPENAI_PROJECT_ID}"      # recommended: project-level isolation and billing
  {}

capabilities:
  streaming: true
  tools: true
  vision: true
  audio_in: true                       # whisper / multimodal models
  audio_out: true                      # tts / realtime
  json_mode: true                      # response_format=json_object or json_schema
  prompt_caching: true                 # system-level caching (automatic on some models)
  reasoning_mode: true                 # o1/o3 series; depends on the specific model
  computer_use: false
  embeddings: true
  long_context_tokens: 128000          # mainstream models; GPT-4.1/4.5 series may go higher
  max_output_tokens: 16384

limits:
  context_window_tokens: 128000
  max_output_tokens: 16384
  rpm: 500
  tpm: 800000
  concurrent: 16

cost:
  # ⚠️ Unit prices vary by model and tier; approximate ceiling for the "flagship model" given here
  pricing:
    input_per_1k_usd: 0.005            # e.g. gpt-4o input; catalogs.md is authoritative
    output_per_1k_usd: 0.015
    cached_input_per_1k_usd: 0.0025
    pricing_as_of: "2026-05-01"
    source_url: "https://openai.com/api/pricing"
  monthly_budget_usd: 50
  per_call_budget_usd: 0.5
  on_budget_exceeded: "block"
  downgrade_to: "openrouter-main"

retry:
  max_attempts: 3
  initial_backoff_ms: 500
  max_backoff_ms: 8000
  jitter: "full"
  retry_on:
    - "http_408"
    - "http_429"
    - "http_500"
    - "http_502"
    - "http_503"
    - "http_504"
    - "timeout_read"
  give_up_on: ["http_400", "http_401", "http_403", "http_404", "http_413"]

timeouts:
  connect_ms: 5000
  read_ms: 60000
  total_ms: 90000

compliance:
  data_residency: "us"
  telemetry_optout: true               # API data is not used for training by default; still double-check in the console
  zero_data_retention: false           # 30-day retention by default; contact sales for ZDR
  pii_allowed: false                   # denied by default; decided by governance
  red_lines:
    - "Never send unredacted PII"
    - "Never send internal codenames"

labels:
  region: "us"
  account: "default"

extensions:
  openai:
    # Enable only when switching to Azure OpenAI (placeholder)
    deployment_mode: "openai"          # openai | azure
    # azure_endpoint: "https://<resource>.openai.azure.com"
    # azure_api_version: "2024-10-21"
    # azure_deployment_name: "gpt-4o"
    # The following is available in the ChatCompletions / Responses API
    response_format_default: "text"    # text | json_object | json_schema
