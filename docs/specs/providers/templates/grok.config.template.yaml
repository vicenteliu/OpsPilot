# Grok (xAI) provider config template
# Docs: https://docs.x.ai (as of 2026-05-01; verify before use)
# The Grok API is close to OpenAI-compatible; the OpenAI SDK can be reused directly.

id: "grok-main"
kind: "grok"
display_name: "xAI Grok"
enabled: true

base_url: "https://api.x.ai/v1"

auth:
  type: "api_key_header"
  env: "XAI_API_KEY"
  header: "Authorization"
  prefix: "Bearer "

default_headers: {}

capabilities:
  streaming: true
  tools: true                          # function calling
  vision: true                         # model-dependent; grok-2-vision series
  audio_in: false
  audio_out: false
  json_mode: true                      # OpenAI-compatible path; response_format=json_schema
  prompt_caching: false                # official docs are authoritative
  reasoning_mode: true                 # grok-3 reasoning / grok-think style
  computer_use: false
  embeddings: false                    # not a current focus (official docs are authoritative)
  long_context_tokens: 131072
  max_output_tokens: 8192

limits:
  context_window_tokens: 131072
  max_output_tokens: 8192
  rpm: 60
  tpm: 200000
  concurrent: 4

cost:
  pricing:
    input_per_1k_usd: 0.005            # approximate; the catalog is authoritative
    output_per_1k_usd: 0.015
    cached_input_per_1k_usd: null
    pricing_as_of: "2026-05-01"
    source_url: "https://x.ai/api"
  monthly_budget_usd: 30
  per_call_budget_usd: 0.5
  on_budget_exceeded: "block"
  downgrade_to: "openrouter-main"

retry:
  max_attempts: 3
  initial_backoff_ms: 500
  max_backoff_ms: 8000
  jitter: "full"
  retry_on:
    - "http_408"
    - "http_429"
    - "http_500"
    - "http_502"
    - "http_503"
    - "http_504"
    - "timeout_read"
  give_up_on: ["http_400", "http_401", "http_403", "http_404", "http_413"]

timeouts:
  connect_ms: 5000
  read_ms: 60000
  total_ms: 90000

compliance:
  data_residency: "us"
  telemetry_optout: true               # explicitly opt out of training use in the console; official policy is authoritative
  zero_data_retention: false
  pii_allowed: false
  red_lines:
    - "Never send unredacted PII"
    - "Never send internal codenames"

labels:
  region: "us"

extensions:
  grok:
    # live search (real-time retrieval) capability switch; adjust per official docs
    live_search:
      enabled: false
      # mode: "on" | "auto" | "off"
      max_results: 10
    # Whether "real-time data" may contribute to answers (compliance point)
    allow_realtime_data: false
