# Anthropic (Claude API) provider config template
# Docs: https://docs.claude.com (as of 2026-05-01; verify before use)
# Note: Anthropic authenticates with x-api-key plus the required anthropic-version header.

id: "anthropic-claude"
kind: "anthropic"
display_name: "Anthropic Claude"
enabled: true

base_url: "https://api.anthropic.com/v1"

auth:
  type: "api_key_custom_header"
  env: "ANTHROPIC_API_KEY"
  header: "x-api-key"
  # Optional: switch away when a third-party proxy requires OAuth/JWT
  extra_env: {}

# anthropic-version is required; use the exact version string from the official docs
default_headers:
  anthropic-version: "2023-06-01"
  # Enable the prompt caching beta (if applicable, adjust per the official docs)
  # anthropic-beta: "prompt-caching-2024-07-31"

capabilities:
  streaming: true
  tools: true
  vision: true
  audio_in: false
  audio_out: false
  json_mode: true                      # forced JSON mode via tool_use
  prompt_caching: true                 # explicit cache_control, requires correct configuration
  reasoning_mode: true                 # some models support extended thinking
  computer_use: true                   # from the claude-sonnet-4 series onward; the model catalog is authoritative
  embeddings: false                    # Anthropic does not currently offer first-party embeddings
  long_context_tokens: 200000
  max_output_tokens: 8192

limits:
  context_window_tokens: 200000
  max_output_tokens: 8192
  rpm: 50
  tpm: 100000
  concurrent: 8

cost:
  # ⚠️ Unit prices per catalogs.md / official docs; sonnet-tier approximation given here
  pricing:
    input_per_1k_usd: 0.003
    output_per_1k_usd: 0.015
    cached_input_per_1k_usd: 0.0003    # cache-hit price (about 1/10)
    pricing_as_of: "2026-05-01"
    source_url: "https://www.anthropic.com/pricing"
  monthly_budget_usd: 50
  per_call_budget_usd: 0.5
  on_budget_exceeded: "block"
  downgrade_to: "openrouter-main"

retry:
  max_attempts: 3
  initial_backoff_ms: 500
  max_backoff_ms: 8000
  jitter: "full"
  retry_on:
    - "http_408"
    - "http_429"
    - "http_500"
    - "http_502"
    - "http_503"
    - "http_504"
    - "timeout_read"
    - "http_529"                       # Anthropic overloaded
  give_up_on: ["http_400", "http_401", "http_403", "http_404", "http_413"]

timeouts:
  connect_ms: 5000
  read_ms: 60000
  total_ms: 90000

compliance:
  data_residency: "us"                 # default; enterprise/Bedrock offers region selection
  telemetry_optout: true               # API data is not used for training by default; the official policy is authoritative
  zero_data_retention: false           # 30-day retention by default; ZDR requires a contract
  pii_allowed: false                   # denied by default
  red_lines:
    - "Never send unredacted PII"
    - "Never send internal codenames"

labels:
  region: "us"

extensions:
  anthropic:
    # Switch when going through AWS Bedrock or GCP Vertex (placeholder)
    deployment_mode: "anthropic"       # anthropic | bedrock | vertex
    # bedrock_region: "us-east-1"
    # vertex_project: "<gcp-project>"
    # vertex_location: "us-east5"
    # Default cache_control config for prompt caching
    cache_control_default:
      type: "ephemeral"                # ephemeral | persistent (per official support)
    # extended thinking (if applicable)
    thinking:
      enabled: false
      budget_tokens: 0
