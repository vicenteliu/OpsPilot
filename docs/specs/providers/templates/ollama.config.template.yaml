# Ollama provider config template
# Self-hosted local inference; data never leaves the network; the default for "sensitive/offline" scenarios.
# Server: https://ollama.com  /  https://github.com/ollama/ollama
# Note: the values below are template defaults; verify against catalogs.md and your actual deployment.

id: "ollama-local"
kind: "ollama"
display_name: "Ollama (Local)"
enabled: true

# Intranet/localhost address; must not point at the public internet
# OpenAI-compatible path: /v1/chat/completions (recommended, easier SDK reuse)
# Native path:            /api/chat
base_url: "http://localhost:11434/v1"

# No auth by default; if ollama serve sits behind a reverse proxy + token, switch to api_key_header
auth:
  type: "none"
  # type: "api_key_header"
  # env: "OLLAMA_API_KEY"
  # header: "Authorization"
  # prefix: "Bearer "

default_headers: {}

# Capabilities depend on the model you actually run; below is a common combination for 14B models like qwen2.5:14b-instruct
capabilities:
  streaming: true
  tools: true                          # model-dependent; supported by llama3.1+ / qwen2.5+
  vision: false                        # model-dependent (llava, qwen2-vl, etc. support it)
  audio_in: false
  audio_out: false
  json_mode: true                      # response_format available on the OpenAI-compatible path
  prompt_caching: false
  reasoning_mode: false
  embeddings: true                     # ollama ships embedding models (e.g. nomic-embed-text)
  long_context_tokens: 32768           # depends on the model and the num_ctx setting
  max_output_tokens: 4096

limits:
  context_window_tokens: 32768
  max_output_tokens: 4096
  rpm: 600
  tpm: 1000000
  concurrent: 4

cost:
  pricing:
    input_per_1k_usd: 0.0              # local inference has zero external purchase cost
    output_per_1k_usd: 0.0
    cached_input_per_1k_usd: null
    pricing_as_of: "2026-05-01"
    source_url: "https://ollama.com"
  monthly_budget_usd: 0
  per_call_budget_usd: 0
  on_budget_exceeded: "warn"
  downgrade_to: null

retry:
  max_attempts: 2
  initial_backoff_ms: 200
  max_backoff_ms: 2000
  jitter: "full"
  retry_on: ["timeout_connect", "timeout_read", "http_503"]
  give_up_on: ["http_400", "http_404"]

timeouts:
  connect_ms: 2000
  read_ms: 120000                      # large local models can be slow
  total_ms: 180000

compliance:
  data_residency: "unspecified"        # local: your machine; depends on your physical location
  telemetry_optout: true               # ollama has no remote telemetry by default
  zero_data_retention: true            # nothing retained externally when local
  pii_allowed: true                    # usually allowed; governance has the final say
  red_lines:
    - "Never run untrusted third-party models on your Ollama instance"
    - "Ensure host disk encryption + controlled sudo access"

labels:
  deployment: "local"
  gpu: "none"                          # none | rtx4090 | a100 | ...

# Vendor-specific feature extensions
extensions:
  ollama:
    keep_alive: "5m"                   # how long the model stays resident in VRAM
    num_ctx: 32768                     # context window (must match capabilities.long_context_tokens)
    num_predict: 4096                  # max generation
    template: null                     # optional: custom prompt template
