# OpenRouter provider config template
# Aggregator gateway: one key for dozens of vendors' models; good for fallback chains and cost comparison.
# Docs: https://openrouter.ai/docs (as of 2026-05-01; verify before use)
# Note: when calling through OpenRouter, the model field needs a vendor prefix, e.g. "anthropic/claude-sonnet-4-6".

id: "openrouter-main"
kind: "openrouter"
display_name: "OpenRouter (Aggregator Gateway)"
enabled: true

# OpenAI-compatible
base_url: "https://openrouter.ai/api/v1"

auth:
  type: "api_key_header"
  env: "OPENROUTER_API_KEY"
  header: "Authorization"
  prefix: "Bearer "

# OpenRouter recommends sending referrer and title for attribution in your dashboard
default_headers:
  HTTP-Referer: "https://github.com/your-org/OpsPilot"
  X-Title: "OpsPilot"

# Capabilities depend on the specific model hit after routing; conservative caps are given here
capabilities:
  streaming: true
  tools: true                          # depends on the underlying model; OR passes tool_use through
  vision: true
  audio_in: false
  audio_out: false
  json_mode: true
  prompt_caching: false                # some underlying models support it; OR pass-through is inconsistent
  reasoning_mode: true                 # true when o1/o3/Gemini-thinking is hit
  embeddings: false                    # OpenRouter does not focus on embeddings
  long_context_tokens: 200000
  max_output_tokens: 8192

limits:
  context_window_tokens: 200000
  max_output_tokens: 8192
  rpm: 200
  tpm: 200000
  concurrent: 8

cost:
  # Note: OR unit prices vary with the routed model; the values here are the "routing policy's default ceiling" acting as an overall gate
  pricing:
    input_per_1k_usd: 0.005
    output_per_1k_usd: 0.015
    cached_input_per_1k_usd: null
    pricing_as_of: "2026-05-01"
    source_url: "https://openrouter.ai/models"
  monthly_budget_usd: 50
  per_call_budget_usd: 0.5
  on_budget_exceeded: "block"
  downgrade_to: "ollama-local"

retry:
  max_attempts: 3
  initial_backoff_ms: 500
  max_backoff_ms: 8000
  jitter: "full"
  retry_on:
    - "http_408"
    - "http_429"
    - "http_500"
    - "http_502"
    - "http_503"
    - "http_504"
    - "timeout_read"
  give_up_on: ["http_400", "http_401", "http_403", "http_404", "http_413"]

timeouts:
  connect_ms: 5000
  read_ms: 60000
  total_ms: 90000

compliance:
  data_residency: "unspecified"
  telemetry_optout: true               # opt out of training use / log retention in account settings
  zero_data_retention: false           # depends on the underlying model and OR settings
  pii_allowed: false                   # denied by default; decided by governance
  red_lines:
    - "Never send unredacted PII"
    - "Never send internal codenames"

labels:
  gateway: "openrouter"

extensions:
  openrouter:
    # Routing preferences (passed through to OR)
    provider_preferences:
      order: ["Anthropic", "OpenAI"]   # prefer these sub-providers
      allow_fallbacks: true
      data_collection: "deny"          # OR-side training data collection switch
    # Example model routing paths (the actual model field is passed in by session/harness)
    example_models:
      - "anthropic/claude-sonnet-4-6"
      - "openai/gpt-4o"
      - "google/gemini-2.5-pro"
      - "x-ai/grok-3"
