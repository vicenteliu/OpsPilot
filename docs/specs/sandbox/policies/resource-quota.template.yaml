# Resource quota template
# Tiered by action class; a single action_request may override values as long as it stays within the hard caps.

version: "1.0.0"

# Hard caps (never exceed)
hard_caps:
  cpu: "2"                  # cores
  memory: "1Gi"
  disk_tmpfs: "256Mi"
  pids: 256
  timeout_seconds: 300

# Defaults (the vast majority of actions use these)
defaults:
  cpu: "1"
  memory: "512Mi"
  disk_tmpfs: "64Mi"
  pids: 128
  timeout_seconds: 30

# Per action class
action_classes:
  shell.read_only:           # read-only inspection (cat, grep, ps)
    cpu: "0.5"
    memory: "256Mi"
    timeout_seconds: 15

  shell.tooling:             # general command-line tools
    cpu: "1"
    memory: "512Mi"
    timeout_seconds: 30

  script.python:             # Python scripts (remember to allow egress when pip installs are involved)
    cpu: "1"
    memory: "768Mi"
    timeout_seconds: 60

  script.ansible:            # Ansible playbook trial run
    cpu: "1"
    memory: "768Mi"
    timeout_seconds: 120

  http.request:              # single HTTP request
    cpu: "0.5"
    memory: "128Mi"
    timeout_seconds: 10

  sql.readonly:              # read-only SQL; short timeout to avoid long-running queries
    cpu: "0.5"
    memory: "256Mi"
    timeout_seconds: 15

  workflow.dryrun:           # n8n / Argo trial run
    cpu: "1"
    memory: "768Mi"
    timeout_seconds: 60

# On exceed
on_exceed:
  cpu_throttle: true         # CPU soft limit: throttle on overage rather than killing outright
  memory_kill: true          # memory hard limit: OOM kill
  timeout_kill: true         # wall-clock timeout: force-kill the container
  record_in_audit: true
