# Network egress allowlist template
# Deny-all by default; allow the minimal subset on demand.

version: "1.0.0"

# mode: deny-all (default) | allowlist | open
# open is strongly discouraged (only for one-off troubleshooting, and revoke it immediately afterwards)
mode: "deny-all"

# DNS resolvers (effective only in allowlist/open modes)
dns:
  resolvers:
    - "1.1.1.1"
    - "8.8.8.8"
  block_dot_local: true            # block internal suffixes such as .local / .lan / .internal by default
  block_metadata_endpoints: true   # block cloud metadata endpoints such as 169.254.169.254 (SSRF prevention)

# Allowed egress targets (effective when mode=allowlist)
egress:
  hosts:
    # - "pkg.debian.org"
    # - "deb.debian.org"
    # - "security.debian.org"
    # - "registry-1.docker.io"
    # - "auth.docker.io"
    # - "production.cloudflare.docker.com"

  cidrs:
    # - "10.0.0.0/8"               # internal network (allow on demand; blocked by default)

  ports:
    allow: [443, 80]               # HTTP/HTTPS; all other ports denied by default
    deny: [22, 23, 25, 3306, 5432, 6379]  # remote login and database ports denied by default (open on demand)

# All ingress denied; no inbound ports are exposed for the sandbox
ingress:
  mode: "deny-all"

# On violation
on_violation:
  action: "abort"                  # abort | log_only
  log_to_audit: true
  notify_on_third_strike: true     # escalate to an alert on the 3rd violation within the same session
