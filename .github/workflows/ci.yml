name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/
      - name: Test (pytest)
        # Mirrors `make test`: skips slow + live-Ollama tests. mypy (pre-existing
        # findings) and the Rust benchmark gate are intentionally not run here.
        run: pytest tests/ -m "not slow and not requires_ollama"

  web:
    name: Web (svelte-check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Type-check (svelte-check)
        run: pnpm check
      - name: Build
        run: pnpm build
