name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (lint + type + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/
      - name: Type-check (mypy)
        run: mypy src/
      - name: Test (pytest)
        # Mirrors `make test`: skips slow + live-Ollama tests.
        run: pytest tests/ -m "not slow and not requires_ollama"

  web:
    name: Web (svelte-check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Type-check (svelte-check)
        run: pnpm check
      - name: Build
        run: pnpm build

  rust-bench:
    name: Rust extensions (build + bench ≥5×)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build extensions (release) and benchmark
        # maturin develop installs into the venv; the bench scripts exit 1 if the
        # Rust speedup over the pure-Python path drops below 5× (~10× / ~42× local).
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -e ".[dev]" maturin
          (cd crates/opspilot-chunker && maturin develop --release)
          (cd crates/opspilot-tokenizer && maturin develop --release)
          make bench
