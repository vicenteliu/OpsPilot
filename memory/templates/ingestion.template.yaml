# RAG 摄入 pipeline 模板 / Ingestion pipeline template
# 阶段：discover → classify → redact → chunk → embed → upsert
# 每阶段必须可重入、可恢复；失败粒度 = 单文档

version: "1.0.0"

# 引用：哪个 KB 的摄入
kb_ref: "kb_public_zh"

# 1. discover —— 发现源 / Source discovery
discover:
  source_root: "playbooks/"
  glob:
    - "**/*.md"
    - "**/*.markdown"
  exclude:
    - "**/_drafts/**"
    - "**/private/**"
    - "**/.obsidian/**"
  follow_symlinks: false
  manifest_output: "${index_root}/manifest.jsonl"   # 每行一条：source_path + last_modified + size

# 2. classify —— 分类与元数据抽取 / Metadata extraction
classify:
  read_frontmatter: true               # 读取 markdown frontmatter（YAML）
  fallback_title: "filename"           # 无 frontmatter.title 时取文件名
  classification_rules_ref: "kb-config.template.yaml#classification_rules"
  language_detect:
    enabled: true
    library_hint: "langdetect or similar"   # 实现层选择；中英判定即可
  tag_extraction:
    from_frontmatter: true
    from_first_h1_keywords: false       # 实验性

# 3. redact —— 脱敏（强约束）/ Redaction (hard requirement)
redact:
  rules_ref: "../../session/templates/redaction-rules.template.yaml"
  hard_fail_on_pii_check: true
  # 命中即写 audit；不写主索引
  audit_log_path: "${index_root}/audit.log"
  # 是否输出"脱敏后副本"（便于人工核对）
  emit_redacted_copy:
    enabled: true
    target_dir: "${index_root}/redacted/"

# 4. chunk —— 分块 / Chunking
chunk:
  strategy: "headings_then_size"
  target_size_tokens: 512
  max_size_tokens: 1024
  overlap_tokens: 64
  preserve_heading_path: true
  # chunk 内容 sha256 用作 chk_<sha8>
  hash_inputs: ["content_after_redact"]
  # chunk 内容 > 8 KiB 时走 artifact，meta 行 content=null + content_artifact_id
  inline_threshold_bytes: 8192

# 5. embed —— 向量化 / Embedding
embed:
  provider_id: "ollama-local"
  model: "nomic-embed-text"
  version: "2024-02"
  dim: 768
  batch_size: 32
  retry:
    max_attempts: 3
    initial_backoff_ms: 500
    max_backoff_ms: 8000
  # 失败 chunk 暂存，后续可单独 retry
  failure_holding_dir: "${index_root}/embed-pending/"

# 6. upsert —— 入库（LanceDB + SQLite 事务）/ Upsert
upsert:
  # 增量同步语义
  delete_obsolete_chunks: true         # 旧 doc_id 下不再出现的 chunks 删除
  update_document_meta: true
  # 失败回滚：本批次内任意 chunk 失败 → 整批不提交
  transactional: true
  # 大批量时关闭实时 index refresh，最后统一 optimize
  defer_index_refresh: true
  finalize:
    refresh_vector_index: true
    rebuild_fts_if_dirty: true

# 7. 全流程 / Pipeline-level
pipeline:
  parallelism: 4
  per_doc_timeout_seconds: 60
  budget:
    total_usd: 1.00                    # 单次摄入预算
    on_exceeded: "block"               # 超出阻断（避免误用云 embedding 烧钱）
  observability:
    log_level: "info"
    metrics:
      - "docs_processed"
      - "chunks_created"
      - "tokens_embedded"
      - "redaction_hits"
      - "errors_total"
    progress_file: "${index_root}/progress.jsonl"

# 8. 触发器 / Triggers
triggers:
  manual: true                          # CLI: opspilot ingest --kb kb_public_zh
  git_post_commit: true                 # 仅在 source_root 下文件变更时触发
  cron: "0 2 * * *"

# 9. Dry-run / 预演
dry_run:
  enabled_default: true                 # 首次跑务必 dry_run
  outputs:
    - "manifest"
    - "would_chunk_count_per_doc"
    - "estimated_embedding_cost_usd"
    - "redaction_hit_summary"
  refuse_apply_if:
    - "estimated_embedding_cost_usd > pipeline.budget.total_usd"
    - "redaction_hard_fail_count > 0"

# 10. 备份 / 回滚 / Backup & rollback
rollback:
  # 摄入前快照 SQLite 与 LanceDB 文件
  snapshot_before_upsert: true
  snapshot_dir: "${index_root}/snapshots/"
  retain_snapshots: 5
  rollback_command_hint: "opspilot kb rollback --kb kb_public_zh --snapshot <id>"
